}

.system-chip:hover {

}

.system-chip.selected {

}

.launch-btn.ready:hover {

}

.launch-btn.ready:active {
    transform: scale(0.98);
}

.emu-toolbar button {

}

}

}

    .page-title { font-size: 1.8rem; }

    .systems-grid { grid-template-columns: repeat(3, 1fr); }
    .dropzone { padding: 1.8rem 1rem; }
}

<body>

<div class="container" id="setupView">
    <div class="header">
        <h1 class="page-title">Emulator</h1>
        <p class="page-subtitle">Play retro games in your browser</p>
    </div>

    <div class="setup-card">
        <h2>1. Load a ROM</h2>
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">&#128190;</div>
            <div class="dropzone-text">
                <strong>Drop ROM file here</strong> or click to browse
            </div>
            <div class="file-info" id="fileInfo" style="display:none">
                <div class="file-name" id="fileName"></div>
                <div class="auto-detected" id="autoDetected"></div>
            </div>
        </div>
        <input type="file" id="romInput" hidden>
    </div>

    <div class="setup-card">
        <h2>2. Select System <span style="font-weight:400;font-size:0.8rem;color:rgba(255,255,255,0.3)">(auto-detected from file)</span></h2>
        <div class="systems-grid" id="systemsGrid"></div>
    </div>

    <button class="launch-btn" id="launchBtn">Select a ROM to start</button>
    <div class="note">Cores load on-demand from CDN. First launch per system may take a moment.</div>
</div>

<div class="emulator-overlay" id="emulatorOverlay">
    <div class="emu-toolbar">
        <button id="backToSetup">&#8592; Back</button>
        <span class="game-title" id="gameTitle"></span>
        <button id="fullscreenBtn">Fullscreen</button>
    </div>
    <iframe class="emu-frame" id="emuFrame" allow="autoplay; gamepad; fullscreen"></iframe>
</div>

<script src="/assets/footer/footer.js" defer></script>
<script src="/assets/js/settings.js" defer></script>
<script src="/assets/js/blank.js" defer></script>
<script>

const SYSTEMS = [
    { id: 'nes',       name: 'NES',           icon: '\u{1F3AE}', detect: ['nes'] },
    { id: 'snes',      name: 'SNES',          icon: '\u{1F3AE}', detect: ['smc','sfc'] },
    { id: 'gb',        name: 'Game Boy',       icon: '\u{1F3AE}', detect: ['gb'] },
    { id: 'gba',       name: 'GBA',            icon: '\u{1F3AE}', detect: ['gba'] },
    { id: 'nds',       name: 'DS',             icon: '\u{1F3AE}', detect: ['nds'] },
    { id: 'n64',       name: 'N64',            icon: '\u{1F3AE}', detect: ['n64','z64','v64'] },
    { id: 'psx',       name: 'PS1',            icon: '\u{1F4BF}', detect: ['pbp','cue','chd'] },
    { id: 'psp',       name: 'PSP',            icon: '\u{1F3AE}', detect: ['cso'] },
    { id: 'segaMD',    name: 'Genesis',        icon: '\u{1F47E}', detect: ['md','gen','smd'] },
    { id: 'segaMS',    name: 'Master Sys',     icon: '\u{1F47E}', detect: ['sms'] },
    { id: 'segaGG',    name: 'Game Gear',      icon: '\u{1F47E}', detect: ['gg'] },
    { id: 'segaSaturn',name: 'Saturn',         icon: '\u{1F4BF}', detect: [] },
    { id: 'segaCD',    name: 'Sega CD',        icon: '\u{1F4BF}', detect: [] },
    { id: 'sega32x',   name: '32X',            icon: '\u{1F47E}', detect: ['32x'] },
    { id: 'atari2600', name: 'Atari 2600',     icon: '\u{1F579}', detect: ['a26'] },
    { id: 'atari7800', name: 'Atari 7800',     icon: '\u{1F579}', detect: ['a78'] },
    { id: 'lynx',      name: 'Atari Lynx',     icon: '\u{1F579}', detect: ['lnx'] },
    { id: 'jaguar',    name: 'Jaguar',         icon: '\u{1F579}', detect: ['j64','jag'] },
    { id: 'vb',        name: 'Virtual Boy',    icon: '\u{1F453}', detect: ['vb','vboy'] },
    { id: '3do',       name: '3DO',            icon: '\u{1F4BF}', detect: [] },
    { id: 'arcade',    name: 'Arcade',         icon: '\u{1F3B0}', detect: [] },
    { id: 'mame2003',  name: 'MAME',           icon: '\u{1F3B0}', detect: [] },
    { id: 'coleco',    name: 'ColecoVision',   icon: '\u{1F3AE}', detect: ['col'] },
];


const EXT_MAP = {};
SYSTEMS.forEach(sys => {
    sys.detect.forEach(ext => { EXT_MAP[ext] = sys; });
});

let selectedSystem = null;
let romFile = null;

const grid = document.getElementById('systemsGrid');
const dropzone = document.getElementById('dropzone');
const romInput = document.getElementById('romInput');
const fileInfo = document.getElementById('fileInfo');
const fileNameEl = document.getElementById('fileName');
const autoDetectedEl = document.getElementById('autoDetected');
const launchBtn = document.getElementById('launchBtn');
const setupView = document.getElementById('setupView');
const emulatorOverlay = document.getElementById('emulatorOverlay');
const gameTitle = document.getElementById('gameTitle');
const emuFrame = document.getElementById('emuFrame');


const chipMap = {};
SYSTEMS.forEach(sys => {
    const chip = document.createElement('div');
    chip.className = 'system-chip';
    chip.textContent = sys.name;
    chip.addEventListener('click', () => selectSystem(sys));
    grid.appendChild(chip);
    chipMap[sys.id] = chip;
});

function selectSystem(sys) {
    Object.values(chipMap).forEach(c => {
        c.classList.remove('selected');
        c.classList.remove('auto-match');
    });
    chipMap[sys.id].classList.add('selected');
    selectedSystem = sys;
    checkReady();
}

function autoDetectSystem(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    return EXT_MAP[ext] || null;
}

function checkReady() {
    if (selectedSystem && romFile) {
        launchBtn.textContent = 'Launch ' + selectedSystem.name + ' Emulator';
        launchBtn.classList.add('ready');
    } else if (romFile) {
        launchBtn.textContent = 'Select a system above';
        launchBtn.classList.remove('ready');
    } else {
        launchBtn.textContent = 'Select a ROM to start';
        launchBtn.classList.remove('ready');
    }
}


dropzone.addEventListener('click', () => romInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
romInput.addEventListener('change', () => {
    if (romInput.files.length) handleFile(romInput.files[0]);
});

function handleFile(file) {
    romFile = file;
    fileNameEl.textContent = file.name;
    fileInfo.style.display = '';
    dropzone.classList.add('has-file');


    const detected = autoDetectSystem(file.name);
    if (detected) {
        autoDetectedEl.innerHTML = 'Auto-detected: <strong>' + detected.name + '</strong>';
        selectSystem(detected);
        chipMap[detected.id].classList.add('auto-match');
    } else {
        autoDetectedEl.textContent = 'Could not auto-detect system. Please select one below.';
        checkReady();
    }
}


launchBtn.addEventListener('click', () => {
    if (!selectedSystem || !romFile) return;
    launchEmulator();
});

function launchEmulator() {
    const blobUrl = URL.createObjectURL(romFile);
    const gameName = romFile.name.replace(/\.[^.]+$/, '');
    const gameId = gameName.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 50);
    gameTitle.textContent = gameName + ' \u2014 ' + selectedSystem.name;


    const html = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  #game { width: 100%; height: 100%; }
</style>
</head><body>
<div id="game"></div>
<script>
  window.EJS_player = '#game';
  window.EJS_core = '${selectedSystem.id}';
  window.EJS_gameUrl = '${blobUrl}';
  window.EJS_gameName = '${gameName.replace(/'/g, "\\'")}';
  window.EJS_gameID = '${gameId}';
  window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
  window.EJS_color = '#6366f1';
  window.EJS_startOnLoaded = true;
  window.EJS_backgroundBlur = true;
<\/script>
<script src="/assets/emulator/loader.js"><\/script>
</body></html>`;

    emuFrame.srcdoc = html;


    setupView.style.display = 'none';
    emulatorOverlay.classList.add('active');
}


document.getElementById('backToSetup').addEventListener('click', () => {
    emuFrame.srcdoc = '';
    emulatorOverlay.classList.remove('active');
    setupView.style.display = '';
});


document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (emuFrame.requestFullscreen) emuFrame.requestFullscreen();
    else if (emuFrame.webkitRequestFullscreen) emuFrame.webkitRequestFullscreen();
});
</script>
<script src="/assets/js/wilway-popup.js" defer></script>
</body>
</html>
