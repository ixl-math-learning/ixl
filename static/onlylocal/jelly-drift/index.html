<script>
(() => {
  // ---------- Overlay ----------
  const overlay = document.createElement("div");
  overlay.id = "big-game-overlay";
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 2147483647;
    background: rgba(0,0,0,0.92); color: #fff;
    display: grid; place-items: center;
    font: 600 22px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    text-align: center; padding: 24px;
  `;
  overlay.innerHTML = `
    <div>
      <div style="font-size:28px;margin-bottom:10px;">Loading…</div>
      <div style="opacity:.85;">This is a BIG game! It may take a while.</div>
    </div>
  `;
  document.documentElement.appendChild(overlay);

  // Show popup immediately
  setTimeout(() => alert("This is a BIG game! It will take a while to load!"), 0);

  // ---------- Removal logic ----------
  let removed = false;
  const removeOverlay = (why) => {
    if (removed) return;
    removed = true;
    overlay.remove();
    // console.log("Overlay removed because:", why);
  };

  // ---------- Detect Unity perf-events requests ----------
  const isUnityPerfReports = (url) => {
    if (!url) return false;
    const s = String(url);
    return s.startsWith("https://perf-events.cloud.unity3d.com/api/v2/projects/")
      && s.includes("/reports");
  };

  // Patch fetch
  const origFetch = window.fetch;
  if (origFetch) {
    window.fetch = function(input, init) {
      try {
        const url = (typeof input === "string") ? input : (input && input.url);
        if (isUnityPerfReports(url)) removeOverlay("fetch:" + url);
      } catch {}
      return origFetch.apply(this, arguments);
    };
  }

  // Patch XHR
  const origOpen = XMLHttpRequest.prototype.open;
  const origSend = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.open = function(method, url) {
    this.__overlayWatchUrl = url;
    return origOpen.apply(this, arguments);
  };
  XMLHttpRequest.prototype.send = function() {
    try {
      if (isUnityPerfReports(this.__overlayWatchUrl)) {
        removeOverlay("xhr:" + this.__overlayWatchUrl);
      }
    } catch {}
    return origSend.apply(this, arguments);
  };

  // Patch sendBeacon (sometimes used for analytics)
  const origBeacon = navigator.sendBeacon?.bind(navigator);
  if (origBeacon) {
    navigator.sendBeacon = function(url, data) {
      try {
        if (isUnityPerfReports(url)) removeOverlay("beacon:" + url);
      } catch {}
      return origBeacon(url, data);
    };
  }

  // ---------- Detect worker "ready" message ----------
  // Your snippet does: postMessage({ ready: true });
  const OrigWorker = window.Worker;
  if (OrigWorker) {
    window.Worker = function(...args) {
      const w = new OrigWorker(...args);
      w.addEventListener("message", (e) => {
        try {
          if (e && e.data && e.data.ready === true) {
            removeOverlay("worker ready:true");
          }
        } catch {}
      });
      return w;
    };
    window.Worker.prototype = OrigWorker.prototype;
  }

  // (Optional) failsafe: remove after a long time no matter what
  // setTimeout(() => removeOverlay("timeout"), 120000);

})();
</script>

<script>
			let max = 0;
			let done = 0;
			function mergeFiles(fileParts) {
				return new Promise((resolve, reject) => {
					let buffers = [];

					function fetchPart(index) {
						if (index >= fileParts.length) {
							let mergedBlob = new Blob(buffers);
							let mergedFileUrl = URL.createObjectURL(mergedBlob);
							resolve(mergedFileUrl);
							return;
						}
						fetch(fileParts[index])
							.then((response) => response.arrayBuffer())
							.then((data) => {
								buffers.push(data);
								done = done+1;
								document.querySelector("#loading-text").textContent = `LOADING... (${done}/${max})`;
								fetchPart(index + 1);
							})
							.catch(reject);
					}
					fetchPart(0);
				});
			}

			function getParts(file, start, end) {
				let parts = [];
				for (let i = start; i <= end; i++) {
					parts.push(file + ".part" + i);
				}
				max = max+end;
				return parts;
			}

			function resizeUnityContainer() {
				var container = document.getElementById("unityContainer");
				container.style.width = window.innerWidth + "px";
				container.style.height = window.innerHeight + "px";
			}
			Promise.all([
				mergeFiles(getParts("Build/jellydrift.data.unityweb", 1, 3)),
        mergeFiles(getParts("Build/jellydrift.wasm.code.unityweb", 1, 2)),
			]).then(([dataUrl, wasmurl]) => {
				window.dataUrll = dataUrl;
        window.wasmurll = wasmurl;
				var json = {
"companyName": "Dani",
"productName": "Jelly Drift",
"productVersion": "0.4",
"dataUrl": dataUrl,
"wasmCodeUrl": wasmurl,
"wasmFrameworkUrl": "jellydrift.wasm.framework.js",
"graphicsAPI": ["WebGL 2.0"],
"webglContextAttributes": {"preserveDrawingBuffer": false},
"splashScreenStyle": "Dark",
"backgroundColor": "#231F20",
"developmentBuild": false,
"multithreading": false,
"unityVersion": "2019.4.19f1"
};
				let blob = new Blob([JSON.stringify(json)], {
					type: "application/json",
				});
				let blobUrl = URL.createObjectURL(blob);
				window.addEventListener("resize", resizeUnityContainer);
				UnityLoader.instantiate("unityContainer", json, {
					url: blobUrl,
					Module: {
						onRuntimeInitialized: function () {
							resizeUnityContainer();
							document.querySelector("#loading-text").remove();
						},
					},
				});
			});
		</script>
