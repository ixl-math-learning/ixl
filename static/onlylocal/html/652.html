<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Removed - Void Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/matte-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--matte-bg-base, #050505);
            color: var(--matte-text-primary, #f0f0f0);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.015) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.01) 0%, transparent 55%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: var(--matte-bg-card, #0f0f0f);
            border: 1px solid var(--matte-border-default, rgba(255, 255, 255, 0.06));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-container svg {
            width: 36px;
            height: 36px;
            stroke: var(--matte-text-muted, rgba(255, 255, 255, 0.35));
            stroke-width: 1.5;
            fill: none;
        }

        .title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            background: linear-gradient(180deg, #4a4a4a 0%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .description {
            font-size: 0.9rem;
            color: var(--matte-text-secondary, rgba(255, 255, 255, 0.6));
            line-height: 1.7;
        }

        .description strong {
            color: var(--matte-text-primary, #f0f0f0);
        }

        @media (max-width: 480px) {
            .icon-container {
                width: 64px;
                height: 64px;
            }
            .icon-container svg {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>

        <h1 class="title">Content Removed</h1>

        <p class="description">
            This content has been taken down due to a <strong>DMCA Takedown Request</strong>.
            We are required to comply with all valid copyright claims under the Digital Millennium Copyright Act.
        </p>

    </div>

    <script src="/assets/js/particles.js"></script>
</body>
</html>
