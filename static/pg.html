<div class="container">

<script>
async function loadPopularLinks() {
    try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbz1w3UhB-6o6JWDcwOfo7622pfuTLeTcL7O-rYinWuYl7JKS5sqk1hm652vWpEyf2nf/exec');
        const data = await response.json();

        let html = '<ol>';
        if (data.length === 0) {
            html = '<div style="text-align: center; padding: 3rem; color: rgba(255, 255, 255, 0.7); font-size: 1.2rem;">No visits recorded yet.</div>';
        } else {
            data.forEach((url) => {
                html += `<li><a href="${url}">${url}</a></li>`;
            });
            html += '</ol>';
        }

        document.getElementById('linksList').innerHTML = html;
    } catch (error) {
        document.getElementById('linksList').innerHTML = '<div style="text-align: center; padding: 3rem; color: rgba(255, 0, 68, 0.7); font-size: 1.2rem;">Unable to load data. Please try again later.</div>';
    }
}

function createParticles() {
    const particlesContainer = document.querySelector('.particles');
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
        particlesContainer.appendChild(particle);
    }
}

createParticles();
loadPopularLinks();

setInterval(loadPopularLinks, 30000);

window.addEventListener('focus', function() {
    loadPopularLinks();
});
</script>
