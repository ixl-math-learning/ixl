    <div class="status-bar">
        <div class="status-item"><div class="status-dot"></div> Ready</div>
        <div class="status-item" id="cursorPos">Ln 1, Col 1</div>
        <div class="status-item" id="langStatus">JavaScript</div>
        <div class="status-item" id="fileSizeStatus">0 bytes</div>
    </div>
</div>

<input type="file" id="fileInput">

<script src="/assets/footer/footer.js" defer></script>
<script src="/assets/js/settings.js" defer></script>
<script src="/assets/js/blank.js" defer></script>

<script>

const LANGS = {
    'htmlmixed':       { name: 'HTML',       ext: 'html', runnable: true,  previewable: true  },
    'css':             { name: 'CSS',        ext: 'css',  runnable: true,  previewable: true  },
    'javascript':      { name: 'JavaScript', ext: 'js',   runnable: true,  previewable: false },
    'python':          { name: 'Python',     ext: 'py',   runnable: false, previewable: false },
    'application/json':{ name: 'JSON',       ext: 'json', runnable: false, previewable: false },
    'markdown':        { name: 'Markdown',   ext: 'md',   runnable: false, previewable: true  },
    'xml':             { name: 'XML',        ext: 'xml',  runnable: false, previewable: false },
    'text/x-csrc':     { name: 'C',          ext: 'c',    runnable: false, previewable: false },
    'text/x-c++src':   { name: 'C++',        ext: 'cpp',  runnable: false, previewable: false },
    'text/x-java':     { name: 'Java',       ext: 'java', runnable: false, previewable: false },
    'text/x-csharp':   { name: 'C#',         ext: 'cs',   runnable: false, previewable: false },
    'php':             { name: 'PHP',        ext: 'php',  runnable: false, previewable: false },
    'sql':             { name: 'SQL',        ext: 'sql',  runnable: false, previewable: false },
};

const EXT_TO_MODE = {
    'html': 'htmlmixed', 'htm': 'htmlmixed',
    'css': 'css',
    'js': 'javascript', 'mjs': 'javascript', 'jsx': 'javascript', 'ts': 'javascript',
    'py': 'python',
    'json': 'application/json',
    'md': 'markdown', 'markdown': 'markdown',
    'xml': 'xml', 'svg': 'xml',
    'c': 'text/x-csrc', 'h': 'text/x-csrc',
    'cpp': 'text/x-c++src', 'cc': 'text/x-c++src', 'hpp': 'text/x-c++src',
    'java': 'text/x-java',
    'cs': 'text/x-csharp',
    'php': 'php',
    'sql': 'sql',
};

const TEMPLATES = {
    'htmlmixed': '<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>My Page</title>\n    <style>\n        body {\n            font-family: sans-serif;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            min-height: 100vh;\n            margin: 0;\n            background: #1a1a2e;\n            color: #eee;\n        }\n        h1 { font-size: 3rem; }\n    </style>\n</head>\n<body>\n    <h1>Hello World!</h1>\n</body>\n</html>',
    'css': '/* Your CSS styles */\nbody {\n    font-family: sans-serif;\n    background: #1a1a2e;\n    color: #eee;\n    margin: 0;\n    padding: 2rem;\n}\n\nh1 {\n    color: #818cf8;\n}',
    'javascript': '// JavaScript\nconst greeting = "Hello, World!";\nconsole.log(greeting);\n\n// Try some code!\nfor (let i = 0; i < 5; i++) {\n    console.log(`Count: ${i}`);\n}\n\nconsole.log("Done!");',
};


const editor = CodeMirror.fromTextArea(document.getElementById('codeArea'), {
    mode: 'javascript',
    theme: 'material-darker',
    lineNumbers: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    autoCloseTags: true,
    matchTags: { bothTags: true },
    foldGutter: true,
    gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
    styleActiveLine: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    lineWrapping: false,
    placeholder: 'Start typing your code...',
    viewportMargin: Infinity,
    extraKeys: {
        'Ctrl-S': () => saveFile(),
        'Cmd-S': () => saveFile(),
        'Ctrl-Enter': () => runCode(),
        'Cmd-Enter': () => runCode(),
        'Ctrl-/': 'toggleComment',
        'Cmd-/': 'toggleComment',
        'F11': (cm) => cm.setOption('fullScreen', !cm.getOption('fullScreen')),
        'Esc': (cm) => { if (cm.getOption('fullScreen')) cm.setOption('fullScreen', false); },
    }
});


editor.setValue(TEMPLATES['javascript'] || '');


let currentFileName = 'untitled.js';
let previewDebounce = null;
let wordWrap = false;


const langSelect = document.getElementById('langSelect');
const previewPane = document.getElementById('previewPane');
const previewFrame = document.getElementById('previewFrame');
const consoleOutput = document.getElementById('consoleOutput');
const cursorPos = document.getElementById('cursorPos');
const langStatus = document.getElementById('langStatus');
const fileSizeStatus = document.getElementById('fileSizeStatus');
const clearConsoleBtn = document.getElementById('clearConsole');
const previewTabs = document.querySelectorAll('.preview-tab');


langSelect.addEventListener('change', () => {
    const mode = langSelect.value;
    editor.setOption('mode', mode);
    const lang = LANGS[mode];
    langStatus.textContent = lang.name;
    currentFileName = 'untitled.' + lang.ext;


    if (TEMPLATES[mode] && editor.getValue().trim() === '') {
        editor.setValue(TEMPLATES[mode]);
    }


    editor.setOption('autoCloseTags', mode === 'htmlmixed' || mode === 'xml');
    editor.setOption('matchTags', (mode === 'htmlmixed' || mode === 'xml') ? { bothTags: true } : false);
});


editor.on('cursorActivity', () => {
    const pos = editor.getCursor();
    cursorPos.textContent = 'Ln ' + (pos.line + 1) + ', Col ' + (pos.ch + 1);
});


editor.on('change', () => {
    const bytes = new Blob([editor.getValue()]).size;
    fileSizeStatus.textContent = bytes < 1024 ? bytes + ' bytes' : (bytes / 1024).toFixed(1) + ' KB';


    const mode = langSelect.value;
    if (LANGS[mode] && LANGS[mode].previewable && !previewPane.classList.contains('hidden')) {
        clearTimeout(previewDebounce);
        previewDebounce = setTimeout(() => autoPreview(), 500);
    }
});


previewTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        previewTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const which = tab.dataset.tab;
        previewFrame.style.display = which === 'preview' ? 'block' : 'none';
        consoleOutput.style.display = which === 'console' ? 'block' : 'none';
        clearConsoleBtn.style.display = which === 'console' ? '' : 'none';
    });
});


function autoPreview() {
    const mode = langSelect.value;
    const code = editor.getValue();

    if (mode === 'htmlmixed') {
        previewFrame.srcdoc = code;
    } else if (mode === 'css') {
        previewFrame.srcdoc = '<!DOCTYPE html><html><head><style>' + code + '</style></head><body><h1>Preview</h1><p>This is a paragraph with <a href="#">a link</a>.</p><ul><li>Item 1</li><li>Item 2</li><li>Item 3</li></ul><button>Button</button></body></html>';
    } else if (mode === 'markdown') {

        let html = code
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^# (.+)$/gm, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code style="background:#333;padding:2px 6px;border-radius:4px">$1</code>')
            .replace(/^- (.+)$/gm, '<li>$1</li>')
            .replace(/\n/g, '<br>');
        previewFrame.srcdoc = '<!DOCTYPE html><html><head><style>body{font-family:sans-serif;padding:2rem;background:#1a1a2e;color:#eee;line-height:1.7}a{color:#818cf8}code{background:#333;padding:2px 6px;border-radius:4px}h1,h2,h3{margin:1rem 0 0.5rem}</style></head><body>' + html + '</body></html>';
    }
}


function runCode() {
    const mode = langSelect.value;
    const code = editor.getValue();


    if (mode === 'htmlmixed' || mode === 'css' || mode === 'markdown') {

        previewTabs.forEach(t => t.classList.remove('active'));
        document.querySelector('[data-tab="preview"]').classList.add('active');
        previewFrame.style.display = 'block';
        consoleOutput.style.display = 'none';
        clearConsoleBtn.style.display = 'none';
        autoPreview();
    } else if (mode === 'javascript') {

        previewTabs.forEach(t => t.classList.remove('active'));
        document.querySelector('[data-tab="console"]').classList.add('active');
        previewFrame.style.display = 'none';
        consoleOutput.style.display = 'block';
        clearConsoleBtn.style.display = '';


        consoleOutput.innerHTML = '';
        addConsoleLine('system', '> Running JavaScript...');


        const runFrame = document.createElement('iframe');
        runFrame.style.display = 'none';
        runFrame.sandbox = 'allow-scripts';
        document.body.appendChild(runFrame);


        const handler = (e) => {
            if (e.source === runFrame.contentWindow) {
                const d = e.data;
                if (d && d.type === 'console') {
                    addConsoleLine(d.method, d.args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
                } else if (d && d.type === 'error') {
                    addConsoleLine('error', d.message);
                } else if (d && d.type === 'done') {
                    addConsoleLine('system', '> Execution complete');
                    window.removeEventListener('message', handler);
                    setTimeout(() => runFrame.remove(), 100);
                }
            }
        };
        window.addEventListener('message', handler);


        const wrappedCode = `
<!DOCTYPE html><html><head><script>
(function(){
    const _post = (method, args) => parent.postMessage({type:'console', method, args: Array.from(args)}, '*');
    console.log = function(){ _post('log', arguments); };
    console.warn = function(){ _post('warn', arguments); };
    console.error = function(){ _post('error', arguments); };
    console.info = function(){ _post('info', arguments); };
    window.onerror = function(msg, src, line, col, err) {
        parent.postMessage({type:'error', message: msg + (line ? ' (line ' + line + ')' : '')}, '*');
    };
    try {
        ${code.replace(/<\/script>/gi, '<\\/script>')}
    } catch(e) {
        parent.postMessage({type:'error', message: e.toString()}, '*');
    }
    parent.postMessage({type:'done'}, '*');
})();
<\/script></head><body></body></html>`;

        runFrame.srcdoc = wrappedCode;


        setTimeout(() => {
            window.removeEventListener('message', handler);
            runFrame.remove();
        }, 10000);

    } else {

        previewTabs.forEach(t => t.classList.remove('active'));
        document.querySelector('[data-tab="console"]').classList.add('active');
        previewFrame.style.display = 'none';
        consoleOutput.style.display = 'block';
        clearConsoleBtn.style.display = '';
        consoleOutput.innerHTML = '';
        addConsoleLine('system', LANGS[mode].name + ' cannot be executed in the browser.');
        addConsoleLine('info', 'You can save the file and run it with a local compiler/interpreter.');
    }


    if (previewPane.classList.contains('hidden')) {
        previewPane.classList.remove('hidden');
        previewToggle.classList.add('active');
    }
}

function addConsoleLine(type, text) {
    const div = document.createElement('div');
    div.className = 'console-line ' + type;
    div.textContent = text;
    consoleOutput.appendChild(div);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
}


function newFile() {
    const mode = langSelect.value;
    editor.setValue(TEMPLATES[mode] || '');
    currentFileName = 'untitled.' + LANGS[mode].ext;
    editor.clearHistory();
    editor.focus();
}

function openFile() {
    document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    currentFileName = file.name;


    const ext = file.name.split('.').pop().toLowerCase();
    const mode = EXT_TO_MODE[ext];
    if (mode) {
        langSelect.value = mode;
        langSelect.dispatchEvent(new Event('change'));
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
        editor.setValue(ev.target.result);
        editor.clearHistory();
        editor.setCursor(0, 0);
    };
    reader.readAsText(file);
    e.target.value = '';
});

function saveFile() {
    const code = editor.getValue();
    const mode = langSelect.value;
    const ext = LANGS[mode] ? LANGS[mode].ext : 'txt';
    const fname = currentFileName || ('untitled.' + ext);

    const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
}


document.getElementById('newBtn').addEventListener('click', newFile);
document.getElementById('openBtn').addEventListener('click', openFile);
document.getElementById('saveBtn').addEventListener('click', saveFile);
document.getElementById('runBtn').addEventListener('click', runCode);
document.getElementById('clearConsole').addEventListener('click', () => {
    consoleOutput.innerHTML = '';
});


const previewToggle = document.getElementById('previewToggle');
previewToggle.addEventListener('click', () => {
    previewPane.classList.toggle('hidden');
    previewToggle.classList.toggle('active');
    setTimeout(() => editor.refresh(), 50);
});
previewToggle.classList.add('active');


const wrapToggle = document.getElementById('wrapToggle');
wrapToggle.addEventListener('click', () => {
    wordWrap = !wordWrap;
    editor.setOption('lineWrapping', wordWrap);
    wrapToggle.classList.toggle('active', wordWrap);
});


const resizeHandle = document.getElementById('resizeHandle');
let isResizing = false;

resizeHandle.addEventListener('mousedown', (e) => {
    isResizing = true;
    resizeHandle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const editorBody = document.querySelector('.editor-body');
    const rect = editorBody.getBoundingClientRect();
    const pct = ((rect.right - e.clientX) / rect.width) * 100;
    const clamped = Math.max(20, Math.min(70, pct));
    previewPane.style.width = clamped + '%';
});

document.addEventListener('mouseup', () => {
    if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        editor.refresh();
    }
});


document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'N') {
        e.preventDefault();
        newFile();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
        e.preventDefault();
        openFile();
    }
});


editor.focus();
</script>
<script src="/assets/js/wilway-popup.js" defer></script>
</body>
</html>
