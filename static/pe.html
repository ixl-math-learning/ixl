    <script>
        function updateCharCount() {
            const textarea = document.getElementById('message');
            const count = document.getElementById('charCount');
            count.textContent = textarea.value.length;
        }

        document.getElementById('message').addEventListener('input', updateCharCount);

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.className = `status-message ${isError ? 'status-error' : 'status-success'}`;
            statusEl.textContent = message;
            statusEl.style.display = 'block';

            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 5000);
        }

        function openSMS() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!phoneNumber) {
                showStatus('Please enter a phone number', true);
                return;
            }

            if (!message) {
                showStatus('Please enter a message', true);
                return;
            }

            const cleanPhoneNumber = phoneNumber.replace(/[^\d+]/g, '');

            if (!cleanPhoneNumber.match(/^\+?[1-9]\d{1,14}$/)) {
                showStatus('Please enter a valid phone number', true);
                return;
            }

            const smsUrl = `sms:${cleanPhoneNumber}?body=${encodeURIComponent(message)}`;

            try {
                window.location.href = smsUrl;
                showStatus('SMS app opened! Send the message from your device.');
            } catch (error) {
                showStatus('Could not open SMS app. Please try manually.', true);
            }
        }

        document.getElementById('phoneNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('message').focus();
            }
        });

        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                openSMS();
            }
        });

        function setupMouseTracking() {
            const pageTitle = document.getElementById('pageTitle');
            const container = document.querySelector('.container');

            document.addEventListener('mousemove', (e) => {
                const containerRect = container.getBoundingClientRect();
                const containerCenterX = containerRect.left + containerRect.width / 2;
                const containerCenterY = containerRect.top + containerRect.height / 2;

                const mouseX = e.clientX;
                const mouseY = e.clientY;

                const deltaX = mouseX - containerCenterX;
                const deltaY = mouseY - containerCenterY;

                const maxOffset = 20;
                const offsetX = -(deltaX / containerRect.width) * maxOffset;
                const offsetY = -(deltaY / containerRect.height) * maxOffset;

                pageTitle.style.transform = `translate(${offsetX}px, ${offsetY}px) translateY(-1rem)`;
            });

            document.addEventListener('mouseleave', () => {
                pageTitle.style.transform = 'translate(0, 0) translateY(-1rem)';
            });
        }

        setupMouseTracking();

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof VoidFooter !== 'undefined') {
                VoidFooter.init();
            }
        });
    </script>
