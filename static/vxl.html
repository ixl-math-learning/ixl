    <script>
    (function(){
        var captured = false;

        function showToast(text, color) {
            try {
                var t = document.createElement('div');
                t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + (color || '#4caf50') + ';color:#fff;padding:12px 22px;border-radius:10px;font-family:Poppins,sans-serif;font-size:14px;font-weight:500;z-index:2147483647;box-shadow:0 6px 18px rgba(0,0,0,0.35);';
                t.textContent = text;
                (document.body || document.documentElement).appendChild(t);
            } catch (e) {}
        }

        function saveAndRedirect(code) {
            if (captured) return;
            if (!code || typeof code !== 'string') return;
            code = code.trim();
            if (!code) return;
            captured = true;
            try { localStorage.setItem('vxl_bookmarklet', code); } catch (e) {}
            try { localStorage.setItem('vxl_bookmarklet_at', String(Date.now())); } catch (e) {}
            try { document.cookie = 'vxl_bookmarklet_set=1; path=/; max-age=' + (365 * 24 * 3600) + '; SameSite=Lax'; } catch (e) {}
            showToast('Bookmarklet captured (' + code.length + ' chars) - loading /ixl...');
            setTimeout(function() { window.top.location.href = '/ixl'; }, 650);
        }

        window.__vxlSaveBookmarklet = saveAndRedirect;

        window.addEventListener('message', function(e) {
            if (!e || !e.data || typeof e.data !== 'object') return;
            if (e.data.__vxlInject === true && typeof e.data.code === 'string') {
                saveAndRedirect(e.data.code);
            }
        });
    })();
    </script>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading VXL...</div>
    </div>

    <div class="vxl-container">
        <iframe id="vxl-frame" class="vxl-frame" src="about:blank" title="VXL" allowfullscreen></iframe>
    </div>

    <script>
    const TARGET_URL = 'https://ixl.vng.lol';
    const frame = document.getElementById('vxl-frame');
    const loadingScreen = document.getElementById('loadingScreen');

    let uvReady = false;
    let uvInitPromise = null;
    let scramjet = null;

    function hideLoading() { loadingScreen.classList.add('hidden'); }

    function withTimeout(promise, ms) {
        return Promise.race([
            promise,
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout after ' + ms + 'ms')), ms))
        ]);
    }

    function waitForSWActivation(worker) {
        return new Promise(function(resolve, reject) {
            worker.addEventListener('statechange', function(e) {
                if (e.target.state === 'activated') resolve();
                else if (e.target.state === 'redundant') reject(new Error('Service worker became redundant'));
            });
        });
    }

    // Mirrors static/view.html's bring-up exactly: set up BareMux transport,
    // construct the Scramjet controller (flags matched), register root-scope
    // /sw.js, wait for activation. Then UV is ready via registerSW().
    async function initializeScramjet() {
        if (window.scramjetReady && window.scramjet && navigator.serviceWorker.controller) {
            scramjet = window.scramjet;
            return true;
        }
        var swAlreadyActive = navigator.serviceWorker && navigator.serviceWorker.controller;
        try {
            if (typeof setupBareMuxTransport === 'function') {
                await withTimeout(setupBareMuxTransport(), 10000);
            } else {
                var connection = window.__vnBareConn || new BareMux.BareMuxConnection("/~r/2/worker.js");
                if (!window.__vnBareConn) window.__vnBareConn = connection;
                var wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/~r/9/";
                await withTimeout(connection.setTransport("/~r/3/index.mjs", [{ wisp: wispUrl }]), 10000);
            }
        } catch (e) {
            if (!swAlreadyActive) return false;
        }
        try {
            var controller = window.$scramjetLoadController();
            scramjet = new controller.ScramjetController({
                prefix: "/~r/p/",
                files: {
                    wasm: "/~r/1/scramjet.wasm.wasm",
                    all: "/~r/1/scramjet.all.js",
                    sync: "/~r/1/scramjet.sync.js"
                },
                flags: {
                    serviceworkers: false,
                    syncxhr: false,
                    strictRewrites: false,
                    rewriterLogs: false,
                    captureErrors: false,
                    cleanErrors: false,
                    scramitize: false,
                    sourcemaps: false,
                    destructureRewrites: false,
                    interceptDownloads: false,
                    allowInvalidJs: true
                }
            });
        } catch (e) { return false; }
        if (!navigator.serviceWorker) return false;
        if (swAlreadyActive) {
            window.scramjet = scramjet;
            window.scramjetReady = true;
            return true;
        }
        try {
            await scramjet.init();
            var reg = await navigator.serviceWorker.register("/sw.js");
            if (reg.installing) await withTimeout(waitForSWActivation(reg.installing), 10000);
            else if (reg.waiting) await withTimeout(waitForSWActivation(reg.waiting), 10000);
            if (!navigator.serviceWorker.controller) {
                await withTimeout(navigator.serviceWorker.ready, 5000);
                await new Promise(function(r) { setTimeout(r, 100); });
            }
            window.scramjet = scramjet;
            window.scramjetReady = true;
            return true;
        } catch (e) { return false; }
    }

    async function initializeUV() {
        try {
            if (typeof registerSW === 'function') await withTimeout(registerSW(), 10000);
            uvReady = true;
            return true;
        } catch (e) { return false; }
    }

    // Visible status pill (top-right) — so we can tell at a glance whether
    // the scanner is running, whether it can see the iframe, and what it found.
    var statusEl = null;
    function ensureStatus() {
        if (statusEl || !document.body) return;
        statusEl = document.createElement('div');
        statusEl.id = '__vxl_status';
        statusEl.style.cssText = 'position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.8);color:#7ce38b;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;padding:6px 10px;border-radius:6px;z-index:2147483647;pointer-events:none;max-width:360px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        document.body.appendChild(statusEl);
    }
    function setStatus(text, color) {
        ensureStatus();
        if (!statusEl) return;
        statusEl.textContent = 'VXL: ' + text;
        statusEl.style.color = color || '#7ce38b';
    }

    function readFromElement(el) {
        if (!el) return '';
        var content = '';
        try { content = (el.textContent || '').trim(); } catch (e) {}
        if (!content) { try { content = (el.innerText || '').trim(); } catch (e) {} }
        if (!content) { try { content = (el.innerHTML || '').trim(); } catch (e) {} }
        if (!content) {
            var attrs = ['data-code','data-bookmarklet','data-content','data-payload','data-bm','value'];
            for (var i = 0; i < attrs.length; i++) {
                try {
                    var v = el.getAttribute && el.getAttribute(attrs[i]);
                    if (v) { content = String(v).trim(); break; }
                } catch (e) {}
            }
        }
        return content;
    }

    // Recursively hunt for #vxlautoinject in every reachable same-origin
    // document. Returns the first non-empty content we find.
    function scanDoc(doc, depth) {
        depth = depth || 0;
        if (!doc || depth > 10) return '';
        try {
            var el = doc.getElementById && doc.getElementById('vxlautoinject');
            if (!el && doc.querySelector) el = doc.querySelector('#vxlautoinject,[id="vxlautoinject"]');
            if (el) {
                var c = readFromElement(el);
                if (c) return c;
            }
        } catch (e) {}
        // Recurse into iframes
        try {
            var iframes = doc.getElementsByTagName ? doc.getElementsByTagName('iframe') : [];
            for (var i = 0; i < iframes.length; i++) {
                try {
                    var subDoc = iframes[i].contentDocument;
                    if (subDoc) {
                        var r = scanDoc(subDoc, depth + 1);
                        if (r) return r;
                    }
                } catch (e) {}
            }
        } catch (e) {}
        return '';
    }

    var scanCount = 0;
    var LAST_SEEN = '';
    function scanLive() {
        scanCount++;
        var code = '';
        var found = false;
        try { code = scanDoc(document, 0); if (code) found = 'top'; } catch (e) {}
        if (!code) {
            try {
                var iframeDoc = frame.contentDocument;
                if (iframeDoc) {
                    code = scanDoc(iframeDoc, 0);
                    if (code) found = 'iframe';
                } else {
                    setStatus('scan #' + scanCount + ' - no iframe doc yet', '#ffb74a');
                    return;
                }
            } catch (e) {
                setStatus('scan #' + scanCount + ' - iframe err: ' + (e && e.message ? e.message : e), '#ff6b6b');
                return;
            }
        }
        if (!code) {
            setStatus('scan #' + scanCount + ' - no #vxlautoinject yet', '#7ce38b');
            return;
        }
        if (code === LAST_SEEN) {
            setStatus('scan #' + scanCount + ' - seen (' + found + ', ' + code.length + ')', '#7ce38b');
            return;
        }
        LAST_SEEN = code;
        setStatus('CAPTURED! ' + found + ' (' + code.length + ' chars)', '#7ce38b');
        try { window.__vxlSaveBookmarklet(code); } catch (e) {}
    }

    // MutationObserver on iframe docs only. Observing the top-level document
    // would create a feedback loop: scanLive calls setStatus which mutates the
    // status pill in document.body, which fires the observer, which reruns
    // scanLive, ad infinitum — freezing the tab. The top-level document is
    // scanned on the interval only.
    var observedDocs = new WeakSet();
    var scanFrameScheduled = false;
    function scheduleScan() {
        if (scanFrameScheduled) return;
        scanFrameScheduled = true;
        requestAnimationFrame(function(){
            scanFrameScheduled = false;
            scanLive();
        });
    }
    function observeDoc(doc) {
        if (!doc || observedDocs.has(doc)) return;
        try {
            observedDocs.add(doc);
            var mo = new MutationObserver(scheduleScan);
            mo.observe(doc, { childList: true, subtree: true, characterData: true });
        } catch (e) {}
    }

    function observeAll() {
        // Deliberately NOT observing the top-level document — see scheduleScan comment.
        try {
            var iframeDoc = frame.contentDocument;
            if (iframeDoc) {
                observeDoc(iframeDoc);
                var nested = iframeDoc.getElementsByTagName ? iframeDoc.getElementsByTagName('iframe') : [];
                for (var i = 0; i < nested.length; i++) {
                    try { observeDoc(nested[i].contentDocument); } catch (e) {}
                }
            }
        } catch (e) {}
    }

    function encodeUrl(url) {
        if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
        try { return __uv$config.prefix + __uv$config.encodeUrl(url); }
        catch (e) { return url; }
    }

    async function loadTarget() {
        ensureStatus();
        setStatus('initializing proxy...', '#ffb74a');

        // view.html picks ONE path — not both. Running initializeScramjet
        // and initializeUV in parallel makes two BareMux transports race for
        // the same SharedWorker port, which spams the 'failed to get a
        // MessagePort' warnings. initializeScramjet alone handles transport
        // + root /sw.js, and /sw.js routes both Scramjet and UV requests.
        await initializeScramjet();

        setStatus('loading IXL...', '#ffb74a');
        const encoded = encodeUrl(TARGET_URL);

        frame.addEventListener('load', function() {
            setStatus('loaded, scanning...', '#7ce38b');
            observeAll();
            scanLive();
            hideLoading();
        });

        frame.src = encoded;
        setTimeout(hideLoading, 15000);

        // 500ms interval is enough for the top-level scan + reattaching observers
        // to newly-created iframes. The MutationObserver (rAF-debounced) catches
        // in-iframe DOM churn in real time without saturating the main thread.
        setInterval(function() {
            observeAll();
            scanLive();
        }, 500);
    }

    document.addEventListener('DOMContentLoaded', loadTarget);
    </script>
