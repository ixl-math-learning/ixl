    <script type="module">
        import { gamesData } from '/assets/gg/gg.js';
        import { appsData } from '/assets/apps/apps.js';

        let foundItem = null;
        let itemType = null;

        const searchInput = document.getElementById('searchInput');
        const searchResult = document.getElementById('searchResult');
        const noResult = document.getElementById('noResult');
        const resultTitle = document.getElementById('resultTitle');
        const resultButton = document.getElementById('resultButton');

        function searchItems(query) {
            if (!query.trim()) {
                hideResults();
                return;
            }

            const searchTerm = query.toLowerCase();

            const foundGame = gamesData.find(game =>
                game.title.toLowerCase().includes(searchTerm)
            );

            if (foundGame) {
                foundItem = foundGame;
                itemType = 'game';
                showResult('Your game was Found!', 'Play Game');
                return;
            }

            const foundApp = appsData.find(app =>
                app.title.toLowerCase().includes(searchTerm)
            );

            if (foundApp) {
                foundItem = foundApp;
                itemType = 'app';
                showResult('Your app was Found!', 'Open App');
                return;
            }

            showNoResult();
        }

        function showResult(title, buttonText) {
            resultTitle.textContent = title;
            resultButton.textContent = buttonText;
            searchResult.classList.add('show');
            noResult.classList.remove('show');
        }

        function showNoResult() {
            searchResult.classList.remove('show');
            noResult.classList.add('show');
        }

        function hideResults() {
            searchResult.classList.remove('show');
            noResult.classList.remove('show');
        }

        function redirectToPage() {
            if (!foundItem || !itemType) return;

            const encodedTitle = encodeURIComponent(foundItem.title.toLowerCase());

            if (itemType === 'game') {
                window.location.href = `/g.html?search=${encodedTitle}`;
            } else if (itemType === 'app') {
                window.location.href = `/a.html?search=${encodedTitle}`;
            }
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchItems(searchInput.value);
            }
        });

        resultButton.addEventListener('click', redirectToPage);

        searchInput.addEventListener('input', () => {
            if (!searchInput.value.trim()) {
                hideResults();
            }
        });
    </script>

        function setupMouseTracking() {
            const pageTitle = document.getElementById('pageTitle');
            const container = document.querySelector('.container');

            document.addEventListener('mousemove', (e) => {
                const containerRect = container.getBoundingClientRect();
                const containerCenterX = containerRect.left + containerRect.width / 2;
                const containerCenterY = containerRect.top + containerRect.height / 2;

                const mouseX = e.clientX;
                const mouseY = e.clientY;

                const deltaX = mouseX - containerCenterX;
                const deltaY = mouseY - containerCenterY;

                const maxOffset = 20;
                const offsetX = -(deltaX / containerRect.width) * maxOffset;
                const offsetY = -(deltaY / containerRect.height) * maxOffset;

                pageTitle.style.transform = `translate(${offsetX}px, ${offsetY}px) translateY(-2rem)`;
            });

            document.addEventListener('mouseleave', () => {
                pageTitle.style.transform = 'translate(0, 0) translateY(-2rem)';
            });
        }

        setupMouseTracking();

        window.addEventListener('load', () => {
            initializeChangelog();
        });

                    sparkle.style.pointerEvents = 'none';
                    sparkle.style.left = '50%';
                    sparkle.style.top = '50%';

                    const angle = (i / 12) * Math.PI * 2;
                    const distance = 30 + Math.random() * 20;
                    const duration = 0.8 + Math.random() * 0.4;

                    sparkle.style.animation = `sparkle-${i} ${duration}s ease-out forwards`;

                    const sparkleStyle = document.createElement('style');
                    sparkleStyle.textContent = `
                        @keyframes sparkle-${i} {
                            to {
                                transform: translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0);
                                opacity: 0;
                            }
                        }
                    `;
                    document.head.appendChild(sparkleStyle);

                    voidLogo.appendChild(sparkle);

                    setTimeout(() => {
                        sparkle.remove();
                        sparkleStyle.remove();
                    }, duration * 1000);
                }
            });
