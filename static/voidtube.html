        var loading = document.getElementById('loading');
        var errorMessage = document.getElementById('errorMessage');
        var resultsContainer = document.getElementById('resultsContainer');
        var resultsHeader = document.getElementById('resultsHeader');
        var videoGrid = document.getElementById('videoGrid');
        var playerOverlay = document.getElementById('playerOverlay');
        var playerTitle = document.getElementById('playerTitle');
        var videoPlayer = document.getElementById('videoPlayer');
        var closePlayer = document.getElementById('closePlayer');

        function searchVideos(query) {
            if (!query || query.trim() === '') return;

            hideResults();
            showLoading();

            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/youtube/search?q=' + encodeURIComponent(query), true);
            xhr.setRequestHeader('Accept', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hideLoading();

                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);

                            if (data.error) {
                                showError(data.error);
                                return;
                            }

                            displayResults(data);

                        } catch (e) {
                            showError('Failed to parse response. Please try again.');
                        }
                    } else {
                        showError('Search failed. Status code: ' + xhr.status);
                    }
                }
            };

            xhr.send();
        }

        function extractVideoId(url) {
            if (!url) return null;

            var patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^#\&\?]*).*/,
                /(?:youtube\.com\/shorts\/)([^#\&\?]*).*/
            ];

            for (var i = 0; i < patterns.length; i++) {
                var match = url.match(patterns[i]);
                if (match && match[1]) {
                    return match[1];
                }
            }

            return null;
        }

        function encodeUrl(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            try {
                return __uv$config.prefix + __uv$config.encodeUrl(url);
            } catch (error) {
                return url;
            }
        }

        function playVideo(title, videoUrl) {
            var videoId = extractVideoId(videoUrl);

            if (!videoId) {
                alert('Could not extract video ID from URL');
                return;
            }

            var pipedUrl = 'https://piped.video/embed/' + videoId + '?autoplay=1';
            var encodedUrl = encodeUrl(pipedUrl);

            playerTitle.textContent = title;
            videoPlayer.src = encodedUrl;
            playerOverlay.style.display = 'flex';

            document.body.style.overflow = 'hidden';
        }

        function closeVideoPlayer() {
            playerOverlay.style.display = 'none';
            videoPlayer.src = '';
            document.body.style.overflow = '';
        }

        function showLoading() {
            loading.style.display = 'block';
            errorMessage.style.display = 'none';
            resultsContainer.style.display = 'none';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            resultsContainer.style.display = 'none';
        }

        function hideResults() {
            resultsContainer.style.display = 'none';
            errorMessage.style.display = 'none';
        }

        function displayResults(data) {
            if (!data.videos || data.videos.length === 0) {
                showError('No videos found for your search term.');
                return;
            }

            resultsHeader.textContent = 'Found ' + data.total_results + ' results for "' + data.search_term + '"';

            videoGrid.innerHTML = '';

            for (var i = 0; i < data.videos.length; i++) {
                var videoCard = createVideoCard(data.videos[i]);
                videoGrid.appendChild(videoCard);
            }

            resultsContainer.style.display = 'block';
        }

        function createVideoCard(video) {
            var card = document.createElement('div');
            card.className = 'video-card';

            var title = video.title || 'Unknown Title';
            var channel = video.channel_name || 'Unknown Channel';
            var views = video.views || '';
            var duration = video.duration || '';
            var link = video.link || '';

            var html = '<div class="video-title">' + escapeHtml(title) + '</div>';
            html += '<div class="video-channel">' + escapeHtml(channel) + '</div>';
            html += '<div class="video-meta">';
            html += '<span class="video-views">' + escapeHtml(views) + '</span>';
            if (duration) {
                html += '<span class="video-duration">' + escapeHtml(duration) + '</span>';
            }
            html += '</div>';

            card.innerHTML = html;

            if (link) {
                card.onclick = function() {
                    playVideo(title, link);
                };
            }

            return card;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function performSearch() {
            var query = searchInput.value.trim();
            if (query) {
                searchVideos(query);
            }
        }

        searchInput.onkeydown = function(e) {
            if (e.keyCode === 13) {
                performSearch();
            }
        };

        searchIcon.onclick = function() {
            performSearch();
        };

        searchInput.oninput = function() {
            if (!searchInput.value.trim()) {
                hideResults();
            }
        };

        closePlayer.onclick = function() {
            closeVideoPlayer();
        };

        playerOverlay.onclick = function(e) {
            if (e.target === playerOverlay) {
                closeVideoPlayer();
            }
        };

        document.onkeydown = function(e) {
            if (e.keyCode === 27 && playerOverlay.style.display === 'flex') {
                closeVideoPlayer();
            }
        };

        async function initializeUV() {
            if (typeof registerSW === 'function') {
                await registerSW();
            }
        }

        window.addEventListener('load', async function() {
            try {
                await initializeUV();
            } catch (error) {
            }
        });
    </script>
<script src="/assets/js/wilway-popup.js" defer></script>
</body>
</html>
