    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--matte-bg-base); color: var(--matte-text-primary); min-height: 100vh; overflow: hidden; }

        .loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--matte-bg-base);
            z-index: 100;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--matte-border-default);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        .loading-text {
            color: var(--matte-text-secondary);
            font-size: 0.95rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #neal-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Neal Fun...</div>
    </div>
    <iframe id="neal-frame" src="/neal-fun-proxy/" allowfullscreen></iframe>

    <script>
    (function() {
        var frame = document.getElementById('neal-frame');
        var loadingScreen = document.getElementById('loadingScreen');

        frame.addEventListener('load', function() {
            loadingScreen.classList.add('hidden');
        });

        setTimeout(function() {
            loadingScreen.classList.add('hidden');
        }, 10000);
    })();
    </script>
