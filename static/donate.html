        <div class="donate-container">
            <h1 class="holographic-title">Support Void Network</h1>

            <div class="button-container">
                <button class="donate-btn primary" id="rawLinkBtn">
                    <i data-lucide="external-link" style="width: 16px; height: 16px;"></i>

                <button class="donate-btn" id="qrBtn">

                    Get QR Code

                <canvas id="qrCode"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        lucide.createIcons();

        const donateUrl = 'https://ko-fi.com/voidnetwork';

        document.getElementById('rawLinkBtn').addEventListener('click', function() {
            window.open(donateUrl, '_blank', 'width=900,height=700,menubar=no,toolbar=no,location=no,status=no');
        });

        document.getElementById('qrBtn').addEventListener('click', function() {
            const qrContainer = document.getElementById('qrContainer');
            qrContainer.classList.toggle('visible');

            if (qrContainer.classList.contains('visible')) {
                new QRious({
                    element: document.getElementById('qrCode'),
                    value: donateUrl,
                    size: 220,
                    backgroundAlpha: 1,
                    foreground: '#000000',
                    background: '#ffffff',
                    level: 'H'
                });
            }
        });
    </script>
