    <div class="container">
        <div class="header">
            <h1 class="page-title">App Library</h1>
            <div class="search-container">
                <input type="text" class="search-bar" id="searchInput" placeholder="Search apps..." spellcheck="false" autocomplete="off">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="loading" id="loadingMessage">
            Loading apps...
        </div>

        <div class="apps-section" id="appsSection">
            <h2 class="section-title">All Apps</h2>
            <div class="apps-grid" id="appsGrid">
            </div>
        </div>

        <div class="no-results" id="noResults">
            <h2>No apps found</h2>
            <p>Try a different search term or check back later for more apps! If you would like to request an app press the phone icon at the bottom of the page!</p>
        </div>
    </div>

    <script type="module">
        import { appsData } from '/assets/apps/apps.js';

        let allApps = [];
        let filteredApps = [];

        function createAppCard(app) {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.dataset.link = app.link;
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';

            card.innerHTML = `
                <img src="${app.imgSrc}" alt="${app.title}" class="app-image" onerror="this.src='/img/appimg/placeholder.png'">
                <div class="app-info">
                    <h3 class="app-title">${app.title}</h3>
                </div>
            `;

            card.addEventListener('click', () => {
                if (app.link.startsWith('/') && !app.link.includes(__uv$config.prefix)) {
                    window.location.href = app.link;
                } else {
                    const encodedTitle = btoa(app.title);
                    window.location.href = `/view.html?app=${encodeURIComponent(app.link)}&title=${encodedTitle}`;
                }
            });

            return card;
        }

        function renderApps(apps) {
            const appsGrid = document.getElementById('appsGrid');
            const noResults = document.getElementById('noResults');
            const appsSection = document.getElementById('appsSection');

            appsGrid.innerHTML = '';

            if (apps.length === 0) {
                appsSection.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            appsSection.style.display = 'block';

            apps.forEach((app, index) => {
                const appCard = createAppCard(app);
                appsGrid.appendChild(appCard);

                setTimeout(() => {
                    appCard.style.transition = 'all 0.4s ease';
                    appCard.style.opacity = '1';
                    appCard.style.transform = 'translateY(0)';
                }, index * 50);
            });
        }

        function filterApps(searchTerm) {
            if (!searchTerm.trim()) {
                filteredApps = [...allApps];
            } else {
                filteredApps = allApps.filter(app =>
                    app.title.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            renderApps(filteredApps);
        }

        function initializeApps() {
            allApps = [...appsData];
            filteredApps = [...allApps];

            document.getElementById('loadingMessage').style.display = 'none';

            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search');

            if (searchParam) {
                document.getElementById('searchInput').value = decodeURIComponent(searchParam);
                filterApps(decodeURIComponent(searchParam));
            } else {
                renderApps(filteredApps);
            }
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterApps(e.target.value);
                }, 300);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeApps();
            setupSearch();
        });
    </script>
