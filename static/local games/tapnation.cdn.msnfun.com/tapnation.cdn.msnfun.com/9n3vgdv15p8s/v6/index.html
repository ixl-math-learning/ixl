    <script>
        window.addEventListener("load", function () {
            if ("ServiceWorker" in navigator) {

        });

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function () {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/9853637125e801e9aae48e78dbbdcfca.loader.js";
      var config = {
        dataUrl: buildUrl + "/c435997b2cc2b4e5ff1d329762ee774d.data.unityweb",

    <script>

    <script>
        // GLOBAL variables for ads
        let interstitialAdInstance = null;
        let rewardedAdInstance = null;

        // Load interstitial ad
        function LoadInterstitialAd() {
            $msstart.loadAdsAsync().then(ad => {
                interstitialAdInstance = ad;
                console.log("Interstitial loaded");
            }).catch(err => {
                console.error("Interstitial load failed", err);
            });
        }

        // Show interstitial ad
        async function ShowInterstitialAd() {
            if (!interstitialAdInstance) {
                console.warn("[MSStart] Interstitial not loaded");
                return;
            }

            try {
                await new Promise(resolve => setTimeout(resolve, 100));
                // 🔇 Mute only after ad object is ready
                gameInstance.SendMessage("MSStartIntegration", "MuteAudio");

                // ⏳ Small delay before showing ad (e.g., 300ms)
                await new Promise(resolve => setTimeout(resolve, 300));

                // Ask SDK to show the ad
                const ad = await $msstart.showAdsAsync(interstitialAdInstance.instanceId);

                // Wait for ad to finish
                await ad.showAdsCompletedAsync;
                console.log("[MSStart] Interstitial completed");
            } catch (e) {
                console.warn("[MSStart] Interstitial show error", e);
            } finally {
                // 🔊 Always unmute + reload
                gameInstance.SendMessage("MSStartIntegration", "UnmuteAudio");
                LoadInterstitialAd();
            }
        }

        // Load rewarded ad
        function LoadRewardedAd() {
            $msstart.loadAdsAsync(true).then(ad => {
                rewardedAdInstance = ad;
                console.log("Rewarded loaded");
            }).catch(err => {
                console.error("Rewarded load failed", err);
            });
        }

        // Show rewarded ad
        async function ShowRewardedAd() {
            if (!rewardedAdInstance) {
                console.warn("Rewarded ad not loaded");
                return;
            }

            try {
                // 🔇 Mute only once ad is ready
                gameInstance.SendMessage("MSStartIntegration", "MuteAudio");

                await new Promise(resolve => setTimeout(resolve, 300));

                const ad = await $msstart.showAdsAsync(rewardedAdInstance.instanceId);

                // Wait for ad to complete
                await ad.showAdsCompletedAsync;
                console.log("Rewarded ad watched fully");

                // Notify Unity about reward
                gameInstance.SendMessage("MSStartIntegration", "OnRewardedAdComplete");
            } catch (err) {
                console.warn("Rewarded ad skipped or failed", err);
            } finally {
                // 🔊 Always unmute + reload
                gameInstance.SendMessage("MSStartIntegration", "UnmuteAudio");
                LoadRewardedAd();
            }
        }

    </script>
