// Intercept dynamic script loading to prevent real SDK from loading
(function() {
    var _origCreateElement = document.createElement.bind(document);
    document.createElement = function(tag) {
        var el = _origCreateElement(tag);

                        console.log('[SDK Mock] Blocked real SDK load:', val);
                        // Fire load event so the caller thinks it loaded
                        setTimeout(function() {
                            var evt = new Event('load');
                            el.dispatchEvent(evt);
                            if (el.onload) el.onload(evt);
                        }, 10);
                        return;
                    }
                    _origSrcSet.call(el, val);
                },

        return el;
    };
})();
