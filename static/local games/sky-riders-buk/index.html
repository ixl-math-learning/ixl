<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Sky Riders</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #1a1a2e;
        }
        #unity-container { width: 100%; height: 100%; position: absolute; }
        #unity-canvas { width: 100%; height: 100%; background: #231f20; }
        #loading-cover {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; background: #1a1a2e; z-index: 10;
        }
        #loading-cover h1 { color: #fff; font-family: Arial, sans-serif; margin-bottom: 30px; }
        .progress-bar { width: 300px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s;
        }
        #loading-text { color: #aaa; font-family: Arial, sans-serif; margin-top: 15px; font-size: 14px; }
        #vn-brand {
            margin-top: 25px; color: #8cbfff; font-family: Arial, sans-serif;
            font-size: 13px; text-align: center; opacity: 0.85;
        }
        #vn-brand a { color: #6aafff; text-decoration: none; }
        #vn-brand a:hover { text-decoration: underline; }
        #vn-watermark {
            position: fixed; bottom: 8px; right: 12px; z-index: 9999;
            font-family: Arial, sans-serif; font-size: 11px; color: rgba(255,255,255,0.35);
            pointer-events: none; text-align: right; line-height: 1.4;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
    </style>
    <!-- CrazyGames SDK Mock - must load BEFORE framework -->
    <script>
    (function() {
        // Comprehensive SDK mock that handles all game calls without errors
        var noop = function() {};
        var resolvedPromise = function(val) { return { then: function(cb) { if(cb) cb(val); return this; }, catch: function() { return this; } }; };

        var mockSDK = {
            environment: 'disabled',
            isQaTool: false,
            init: function(opts) {
                console.log('[SDK Mock] Initialized (mock)');
                return resolvedPromise();
            },
            ad: {
                requestAd: function(type, callbacks) {
                    console.log('[SDK Mock] Ad requested:', type, '- auto-completing');
                    // Simulate: ad starts then immediately finishes (no actual ad)
                    setTimeout(function() {
                        if (callbacks && callbacks.adStarted) callbacks.adStarted();
                        setTimeout(function() {
                            if (callbacks && callbacks.adFinished) callbacks.adFinished();
                        }, 100);
                    }, 50);
                    return resolvedPromise();
                },
                hasAdblock: function() { return resolvedPromise(false); },
                prefetchAd: noop,
                addAdblockPopupListener: noop,
            },
            banner: {
                requestOverlayBanners: function(b, cb) { if(cb) cb(null, null, null); },
            },
            game: {
                gameplayStart: noop,
                gameplayStop: noop,
                happytime: noop,
                hideInviteButton: noop,
                showInviteButton: noop,
                inviteLink: function() { return ''; },
                settings: {},
            },
            user: {
                isUserAccountAvailable: false,
                systemInfo: {},
                getUser: function() { return resolvedPromise(null); },
                getUserToken: function() { return resolvedPromise(''); },
                getXsollaUserToken: function() { return resolvedPromise(''); },
                addScore: noop,
                submitScore: noop,
                addAuthListener: noop,
                showAuthPrompt: function() { return resolvedPromise(null); },
                showAccountLinkPrompt: function() { return resolvedPromise(null); },
            },
            data: {
                getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
                setItem: function(key, val) { try { localStorage.setItem(key, val); } catch(e) {} },
                removeItem: function(key) { try { localStorage.removeItem(key); } catch(e) {} },
                clear: function() { try { localStorage.clear(); } catch(e) {} },
                syncUnityGameData: noop,
            },
            analytics: {
                trackOrder: noop,
            },
        };

        window.CrazyGames = { SDK: mockSDK };

        // Block the real SDK from loading
        var origCreateElement = document.createElement.bind(document);
        document.createElement = function(tag) {
            var el = origCreateElement(tag);
            if (tag.toLowerCase() === 'script') {
                var origSet = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src').set;
                Object.defineProperty(el, 'src', {
                    set: function(val) {
                        if (val && val.indexOf('sdk.crazygames.com') !== -1) {
                            console.log('[SDK Mock] Blocked real SDK load:', val);
                            // Fire load event so framework continues
                            setTimeout(function() { el.dispatchEvent(new Event('load')); }, 10);
                            return;
                        }
                        origSet.call(el, val);
                    },
                    get: function() { return el.getAttribute('src') || ''; }
                });
            }
            return el;
        };

        console.log('[SDK Mock] CrazyGames SDK mock installed');
    })();
    </script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="loading-cover">
            <h1>Sky Riders</h1>
            <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <div id="loading-text">Loading... 0%</div>
            <div id="vn-brand">Locally Converted by Void Network · <a href="https://vng.lol">vng.lol</a></div>
        </div>
    </div>
    <div id="vn-watermark">Locally Converted by Void Network<br>vng.lol</div>
    <script src="Build/loader.js"></script>
    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingCover = document.querySelector("#loading-cover");
        var progressFill = document.querySelector("#progress-fill");
        var loadingText = document.querySelector("#loading-text");
        var config = {
            dataUrl: "Build/game.data",
            frameworkUrl: "Build/framework.js",
            codeUrl: "Build/game.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Sky Riders",
            productVersion: "1.0",
        };
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
        }
        createUnityInstance(canvas, config, function (progress) {
            var pct = Math.round(progress * 100);
            progressFill.style.width = pct + "%";
            loadingText.textContent = "Loading... " + pct + "%";
        }).then(function (unityInstance) {
            loadingCover.style.display = "none";
            setTimeout(function() {
                var wm = document.getElementById("vn-watermark");
                wm.style.transition = "opacity 3s";
                wm.style.opacity = "0";
            }, 8000);
        }).catch(function (message) {
            loadingText.textContent = "Error: " + message;
            loadingText.style.color = "#f44";
            console.error(message);
        });
    </script>
</body>
</html>
