    <script src="Build/UnityLoader.js"></script>
  <script>
    /*tắt bỏ bảng cảnh báo device mobile*/
    UnityLoader.compatibilityCheck=function(e,t,r){t();};
   var gameInstance = UnityLoader.instantiate("gameContainer", "Build/sloperun.json", {onProgress: UnityProgress});

   function UnityProgress(gameInstance, progress) {
    if (!gameInstance.Module) {
        return;
    }
    const loader = document.querySelector("#loader");
    if (!gameInstance.progress) {
        const progress = document.querySelector("#loader .progress");
        progress.style.display = "block";
        gameInstance.progress = progress.querySelector(".full");

        gameInstance.box_process = progress.querySelector(".box_process");

        gameInstance.posfull = progress.querySelector(".posfull");

        loader.querySelector(".spinner").style.display = "none";
    }
    gameInstance.progress.style.transform = `scaleX(${progress})`;
    if (progress === 1 && !gameInstance.removeTimeout) {
        gameInstance.removeTimeout = setTimeout(function () {
            loader.style.display = "none";
        }, 2000);
    }
}
document.addEventListener('DOMContentLoaded', function () {
	/* sự kiện xảy ra khi đối tượng đã được tải*/
	window.onload = (event) => {
			HiddenClass();
		};
	/* sự kiện khi thay đổi kích thước*/
	window.addEventListener('resize', function (event) {
			HiddenClass();
		});
	/*sự kiện nhấn hoặc chạm vào màn hình*/
	var theElement = document.getElementById("gameContainer");
	theElement.addEventListener("mouseup", tapOrClick, false);
	theElement.addEventListener("touchend", tapOrClick, false);
});
/* đã chạm*/
function tapOrClick(event) {
        fullScreenAPI();
        event.preventDefault();
        return false;
    }
/*kiểm tra màn hình nếu chiều cao lớn hơn chiều ngang thì hiển thị ra bảng cần xoay màn hình*/
    function HiddenClass(instane_game) {
        var widthPage = window.innerWidth;
        var heightPage = window.innerHeight;
        if (heightPage > widthPage) {
            document.getElementById('orientation').style.display = "block";            
            document.getElementById("gameContainer").style.display = "none"; 
            gameInstance.SendMessage('AudioMainController', 'JSCallUnity', 0);
       }
        else{
            document.getElementById('orientation').style.display = "none";
            document.getElementById("gameContainer").style.display = "block";
            gameInstance.SendMessage('AudioMainController', 'JSCallUnity', 1);
         }
    }
/* kiểm tra nếu  là thiết bị android thì mới cho fullscreen (note thiết bị ios không cho phép fullscreen)*/
    function fullScreenAPI(){
        var ua = navigator.userAgent.toLowerCase();
        var isAndroid = ua.indexOf("android") > -1;
            if(isAndroid) {
                    GoFullScreen(document.documentElement);
            }
        }
/* kiểm tra đúng trình duyệt mới cho fullscreen*/
	function GoFullScreen(element) {
        if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement ) {
            if(element.requestFullscreen && document.fullscreenEnabled){
                element.requestFullscreen();
            } 
            else if(element.mozRequestFullScreen){
                element.mozRequestFullScreen();
            }
            else if(element.webkitRequestFullscreen){
                element.webkitRequestFullscreen();
            } 
            else if(element.msRequestFullscreen){
                element.msRequestFullscreen();
            }
        }
    }
</script>
