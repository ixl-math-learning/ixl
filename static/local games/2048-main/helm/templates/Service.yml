apiVersion: v1
kind: Service
metadata:
  name: "{{ .Chart.Name }}"
spec:
  selector:
    app: "{{ .Chart.Name }}"
  type: LoadBalancer
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - name: "{{ .Chart.Name }}"
    protocol: TCP
    port: 80
    targetPort: 80