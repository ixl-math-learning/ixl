apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  annotations:
    nginx.org/use-regex: "true"
    nginx.org/backend-protocol: "HTTP"
    nginx.org/proxy-body-size: "500m"
    nginx.org/client-max-body-size: "500m"

spec:
  ingressClassName: nginx
  rules:
    - host: 2048game.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{{ .Chart.Name }}"
                port:
                  number: 80
