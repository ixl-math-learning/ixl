<body>
    <iframe id="game-frame" src="https://games.crazygames.com/en_US/buildnow-gg/index.html?v=1.345"></iframe>

    <script>
        const gameFrame = document.getElementById('game-frame');
        
        function checkAndClickElements() {
            try {
                const iframeDoc = gameFrame.contentDocument || gameFrame.contentWindow.document;
                
                // Check for all footer elements to remove
                const footers = iframeDoc.querySelectorAll('.css-1h1938b, .css-1xe247z, .MuiGrid-wrap-xs-nowrap');
                footers.forEach(footer => {
                    if (footer && footer.style.display !== 'none') {
                        footer.style.display = 'none';
                    }
                });
                
                // Check for any button with "Play now" text
                const allButtons = iframeDoc.querySelectorAll('button');
                allButtons.forEach(button => {
                    const text = button.textContent.trim().toLowerCase();
                    if (text.includes('play now') || text.includes('play here')) {
                        button.click();
                    }
                    if (text.includes('continue offline')) {
                        button.click();
                    }
                });
                
            } catch (error) {
                // Silently handle cross-origin errors
            }
        }

        // Wait for iframe to load
        gameFrame.addEventListener('load', function() {
            // Start checking for elements every 100ms for faster response
            setInterval(checkAndClickElements, 100);
            
            // Also check immediately
            checkAndClickElements();
        });

        // Fallback: Start checking after 500ms even if load event doesn't fire
        setTimeout(() => {
            setInterval(checkAndClickElements, 100);
            checkAndClickElements();
        }, 500);
        
        // Also check very early
        setTimeout(checkAndClickElements, 100);
    </script>
