        function updateCoinDisplay() {
            coinDisplay.textContent = _coinBalance.toLocaleString();
            
            // Update drop button title based on coin balance
            if (_coinBalance < config.dropCost) {
                dropButton.title = "Drop a ball (will go negative)";
            } else {
                dropButton.title = "Drop a ball";
            }
        }

        function showCoinChangeAnimation(amount) {
            const coinChange = document.createElement('div');
            coinChange.className = `coin-change ${amount > 0 ? 'positive' : 'negative'}`;
            coinChange.textContent = `${amount > 0 ? '+' : ''}${amount}`;
            
            const coinDisplayElement = document.querySelector('.coin-display');
            coinDisplayElement.style.position = 'relative';
            coinDisplayElement.appendChild(coinChange);
            
            setTimeout(() => {
                if (coinChange.parentNode) {
                    coinChange.remove();
                }
            }, 2000);
        }

        // Resize canvas to fit container
        function resizeCanvas() {
            const gameBoard = document.querySelector('.game-board');
            if (!gameBoard) return;
            
            canvasWidth = gameBoard.clientWidth;
            canvasHeight = gameBoard.clientHeight;
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            if (!gameActive) {
                setupGame();
                drawGame();
            }
        }

        // Utility function to shuffle an array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Generate bucket rewards
        function generateBucketRewards() {
            const rewards = [];
            for (let i = 0; i < config.buckets; i++) {
                let reward;
                if (i < 2) {
                    reward = Math.floor(Math.random() * (0 - config.minReward) + config.minReward);
                } else if (i >= config.buckets - 2) {
                    reward = Math.floor(Math.random() * config.maxReward);
                } else {
                    reward = Math.floor(Math.random() * (config.maxReward - config.minReward) + config.minReward);
                }
                rewards.push(reward);
            }
            
            for (let i = 0; i < rewards.length; i++) {
                rewards[i] = Math.round(rewards[i] / 10) * 10;
            }
            
            shuffleArray(rewards);
            return rewards;
        }

        // Setup the game
        function setupGame() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            
            if (!canvasWidth || !canvasHeight) {
                resizeCanvas();
            }
            
            ball = null;
            pegs = [];
            buckets = [];
            gameActive = false;
            gameComplete = false;
            
            updateCoinDisplay();
            
            const startX = canvasWidth / 2;
            const startY = 60;
            
            const optimalPegSpacing = Math.min(
                config.pegSpacing,
                canvasWidth / (config.pegRows + 1),
                canvasHeight / (config.pegRows + 4)
            );
            
            const actualPegSpacing = Math.min(config.pegSpacing, optimalPegSpacing);
            
            // Create pegs in triangular pattern
            for (let row = 0; row < config.pegRows; row++) {
                const pegCount = row + 1;
                
                for (let i = 0; i < pegCount; i++) {
                    const x = startX - (pegCount - 1) * actualPegSpacing / 2 + i * actualPegSpacing;
                    const y = startY + row * actualPegSpacing;
                    
                    pegs.push({
                        x: x,
                        y: y,
                        radius: config.pegRadius
                    });
                }
            }
            
            // Setup buckets
            const bucketWidth = canvasWidth / config.buckets;
            const bucketY = canvasHeight - 60;
            const rewards = generateBucketRewards();
            
            for (let i = 0; i < config.buckets; i++) {
                const x = (i * bucketWidth) + (bucketWidth / 2);
                buckets.push({
                    x: x,
                    y: bucketY,
                    width: bucketWidth,
                    height: 50,
                    reward: rewards[i]
                });
            }
            
            drawGame();
        }

        // Drop ball function
        async function dropBall() {
            if (gameActive || gameComplete) return;
            
            // Always allow dropping, even with negative balance
            await updateCoins(-config.dropCost);
            
            ball = {
                x: canvasWidth / 2,
                y: 30,
                radius: config.ballRadius,
                velocityX: 0,
                velocityY: config.dropSpeed
            };
            
            gameActive = true;
            gameComplete = false;
            dropButton.disabled = true;
            resetButton.disabled = true;
            scoreDisplay.textContent = 'Ball dropping...';
            animateGame();
        }

        // Reset game function
        async function resetGame() {
            // Always allow reset, even with negative balance
            await updateCoins(-config.resetCost);
            scoreDisplay.innerHTML = `<span class="lose-amount">Reset cost: -${config.resetCost} coins</span>`;
            setupGame();
        }

        // Main game animation loop
        function animateGame() {
            if (!gameActive) return;
            
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            updateBall();
            drawGame();
            animationFrame = requestAnimationFrame(animateGame);
        }

        // Update ball physics
        function updateBall() {
            if (!ball) return;
            
            ball.velocityY += config.gravity;
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            
            // Check for collisions with pegs
            for (const peg of pegs) {
                const dx = ball.x - peg.x;
                const dy = ball.y - peg.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ball.radius + peg.radius) {
                    const angle = Math.atan2(dy, dx);
                    
                    const minDistance = ball.radius + peg.radius;
                    ball.x = peg.x + Math.cos(angle) * minDistance;
                    ball.y = peg.y + Math.sin(angle) * minDistance;
                    
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    
                    const dotProduct = ball.velocityX * normalX + ball.velocityY * normalY;
                    
                    ball.velocityX -= 2 * dotProduct * normalX;
                    ball.velocityY -= 2 * dotProduct * normalY;
                    
                    ball.velocityX *= config.friction * config.bounceSpeed;
                    ball.velocityY *= config.friction * config.bounceSpeed;
                    
                    ball.velocityX += (Math.random() - 0.5) * 0.8;
                }
            }
            
            // Keep ball within bounds
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.velocityX = Math.abs(ball.velocityX) * config.friction;
            } else if (ball.x + ball.radius > canvasWidth) {
                ball.x = canvasWidth - ball.radius;
                ball.velocityX = -Math.abs(ball.velocityX) * config.friction;
            }
            
            // Check if ball has entered a bucket
            if (ball.y > buckets[0].y - ball.radius) {
                for (let i = 0; i < buckets.length; i++) {
                    const bucket = buckets[i];
                    if (ball.x > bucket.x - bucket.width / 2 && 
                        ball.x < bucket.x + bucket.width / 2) {
                        
                        gameComplete = true;
                        gameActive = false;
                        
                        updateCoins(bucket.reward);
                        
                        if (bucket.reward >= 0) {
                            scoreDisplay.innerHTML = `You won: <span class="win-amount">+${bucket.reward}</span>`;
                        } else {
                            scoreDisplay.innerHTML = `You lost: <span class="lose-amount">${bucket.reward}</span>`;
                        }
                        
                        dropButton.disabled = false;
                        resetButton.disabled = false;
                        break;
                    }
                }
            }
            
            // Force ball into bucket if it escapes
            if (ball.y > canvasHeight) {
                let nearestBucket = buckets[0];
                let nearestDistance = Math.abs(ball.x - buckets[0].x);
                
                for (let i = 1; i < buckets.length; i++) {
                    const distance = Math.abs(ball.x - buckets[i].x);
                    if (distance < nearestDistance) {
                        nearestDistance = distance;
                        nearestBucket = buckets[i];
                    }
                }
                
                ball.x = nearestBucket.x;
                ball.y = nearestBucket.y + 1;
                ball.velocityX = 0;
                ball.velocityY = 1;
            }
        }

        // Draw all game elements
        function drawGame() {
            if (!canvas || !ctx) return;
            
            if (canvas.width === 0 || canvas.height === 0) {
                resizeCanvas();
            }
            
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            // Draw pegs
            pegs.forEach(peg => {
                ctx.beginPath();
                ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
                
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 8;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.shadowBlur = 0;
            });
            
            // Draw buckets
            buckets.forEach(bucket => {
                ctx.beginPath();
                ctx.rect(bucket.x - bucket.width / 2, bucket.y, bucket.width, bucket.height);
                ctx.fillStyle = 'rgba(40, 40, 40, 0.9)';
                ctx.fill();
                
                ctx.shadowColor = 'rgba(255, 255, 255, 0.6)';
                ctx.shadowBlur = 6;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (bucket.reward >= 0) {
                    ctx.fillStyle = '#4caf50';
                    ctx.fillText(`+${bucket.reward}`, bucket.x, bucket.y + bucket.height / 2);
                } else {
                    ctx.fillStyle = '#f44336';
                    ctx.fillText(`${bucket.reward}`, bucket.x, bucket.y + bucket.height / 2);
                }
            });
            
            // Draw guide triangle
            if (pegs.length > 0) {
                const topPeg = pegs[0];
                const lastRowStartIndex = Math.max(0, pegs.length - config.pegRows);
                const leftPeg = pegs[lastRowStartIndex];
                const rightPeg = pegs[pegs.length - 1];
                
                ctx.beginPath();
                ctx.moveTo(topPeg.x, topPeg.y - 20);
                ctx.lineTo(leftPeg.x - 20, buckets[0].y);
                ctx.lineTo(rightPeg.x + 20, buckets[0].y);
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // Draw ball
            if (ball) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(
                    ball.x - 3, ball.y - 3, 1,
                    ball.x, ball.y, ball.radius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#aaa');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 12;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // Initialize particles animation
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                
                const size = Math.random() * 8 + 3;
                particle.style.width = particle.style.height = size + 'px';
                particle.style.animationDuration = (Math.random() * 8 + 12) + 's';
                particle.style.animationDelay = (Math.random() * 2) + 's';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.remove();
                    }
                }, 22000);
            }, 600);
        }

        // Authentication state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserBalance();
            } else {
                currentUser = null;
                _coinBalance = 1000;
                updateCoinDisplay();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            if (!currentUser) {
                _coinBalance = 1000;
                updateCoinDisplay();
            }
            
            // Event listeners
            dropButton.addEventListener('click', dropBall);
            resetButton.addEventListener('click', resetGame);
            window.addEventListener('resize', resizeCanvas);
            
            // Initial setup
            resizeCanvas();
            setupGame();
        });
    </script>
</body>
</html>
