    <script>
const API='/api/vg',NUM=5,BASE_INT=355,RELIGHT=0.5;
const GREEN_C=0.15,ORANGE_C=0.20,RED_C=0.15,BLUE_C=0.12,PURPLE_C=0.10,BROWN_C=0.10,RAINBOW_C=0.08,PINK_C=0.05,BLACK_C=0.025;
const RB_DUR=15000,RB_INT=325,SP_MIN=600,SP_MAX=1400,PW_DUR=5000,PW_SLOW=2;
const V_LOSE=30,V_STOP=15;
let user,sessId,score=0,pending=0,lost=0,sw=[],lastR=0,over=false,pups=[],rbMode=false,rbStart=0,loop,rbSw=[],audioCtx;

function calcScale(){const vw=window.innerWidth,vh=window.innerHeight;const s=Math.min(vw/700,vh/550,1.4);document.documentElement.style.setProperty('--s',Math.max(0.55,s).toFixed(3))}
calcScale();window.addEventListener('resize',calcScale);

function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}}
function playClick(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(2500,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(1800,audioCtx.currentTime+0.03);o.type='square';g.gain.setValueAtTime(0.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.05);o.start();o.stop(audioCtx.currentTime+0.05)}
function playPop(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(600,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(200,audioCtx.currentTime+0.08);o.type='sine';g.gain.setValueAtTime(0.25,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);o.start();o.stop(audioCtx.currentTime+0.08)}
function playGood(){initAudio();[523,659,784].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);o.start();o.stop(audioCtx.currentTime+0.12)},i*50)})}
function playBad(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(200,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.25);o.type='sawtooth';g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);o.start();o.stop(audioCtx.currentTime+0.25)}
function playSpecial(){initAudio();[523,659,784,1047].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.18,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.start();o.stop(audioCtx.currentTime+0.2)},i*70)})}
function playJackpot(){initAudio();[523,659,784,880,1047,1175,1319,1568].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='triangle';g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);o.start();o.stop(audioCtx.currentTime+0.25)},i*50)})}
function playRainbow(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(400,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(1600,audioCtx.currentTime+0.4);o.type='sine';g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start();o.stop(audioCtx.currentTime+0.4)}
function playSlowdown(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(1000,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(300,audioCtx.currentTime+0.3);o.type='sine';g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.start();o.stop(audioCtx.currentTime+0.3)}
function playDeath(){initAudio();[400,300,200,100].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sawtooth';g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.start();o.stop(audioCtx.currentTime+0.2)},i*80)})}

function auth(){const s=localStorage.getItem('vg_user');if(!s){location.href='/voidgames/voidgames.html';return false}user=JSON.parse(s);return true}
async function startSess(){try{const r=await fetch(API+'/game/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameType:'lightswitch'})});const d=await r.json();if(d.success){sessId=d.gameSessionId;return true}return false}catch{return false}}
async function deduct(a,r){if(a<=0)return;try{await fetch(API+'/game/deduct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,amount:a,reason:r})})}catch{}}
async function reportEvent(type,data={}){if(!sessId)return null;try{const r=await fetch(API+'/game/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,eventType:type,eventData:data})});return await r.json()}catch{return null}}
async function endSess(pen=0,netAmount=0){if(!sessId)return{};try{const r=await fetch(API+'/game/end',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,finalScore:score,netAmount:netAmount,penalty:pen})});sessId=null;return r.json()}catch{return{}}}
function popup(a,x,y){const d=Math.floor(a);if(d===0)return;const p=document.createElement('div');p.className='vng-popup '+(a>=0?'positive':'negative');p.textContent=(a>=0?'+':'')+d;p.style.left=x+'px';p.style.top=y+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),1000)}
function upd(){document.getElementById('pendingDisplay').textContent='+'+Math.floor(pending);document.getElementById('lostDisplay').textContent='-'+Math.floor(lost);document.getElementById('scoreDisplay').textContent=score}
function mkSw(i){return{i,lit:false,grn:false,spec:null,exp:0,last:0}}
function initSw(){const c=document.getElementById('switches');c.innerHTML='';sw=[];for(let i=0;i<NUM;i++){sw.push(mkSw(i));const e=document.createElement('div');e.className='switch off';e.dataset.i=i;e.onclick=ev=>click(i,ev);c.appendChild(e)}sw[Math.floor(Math.random()*NUM)].lit=true;vis()}
function vis(){const c=document.getElementById('switches'),els=c.children,act=rbMode?rbSw:sw;let lit=0;for(let i=0;i<act.length;i++){const s=act[i],e=els[i];if(!e)continue;e.className='switch';if(s.spec)e.classList.add(s.spec);else if(s.lit){lit++;e.classList.add(s.grn?'green':'yellow')}else e.classList.add('off')}document.getElementById('litCount').textContent=lit;upd();if(lit>=NUM&&!over)end(false)}
async function click(i,ev){if(over)return;initAudio();const act=rbMode?rbSw:sw,s=act[i];if(!s)return;const now=Date.now(),r=ev.target.getBoundingClientRect(),px=r.left+r.width/2,py=r.top;
if(rbMode){if(s.lit){s.lit=false;s.last=now;score+=500;playPop();const res=await reportEvent('click',{isRainbow:true});if(res?.success&&res.vngReward){pending+=res.vngReward;popup(res.vngReward,px,py)}vis()}else{playClick()}return}
if(s.spec){const res=await reportEvent('special',{specialType:s.spec});switch(s.spec){case'orange':playBad();score=Math.max(0,~~(score*0.75));lost+=2;popup(-2,px,py);deduct(2,'orange');break;case'red':playBad();score=Math.max(0,~~(score*0.5));lost+=5;popup(-5,px,py);deduct(5,'red');break;case'blue':playSlowdown();pups.push({exp:now+PW_DUR,f:PW_SLOW});document.getElementById('powerupInd').classList.add('active');document.getElementById('powerupCount').textContent=pups.length;break;case'purple':playDeath();s.spec=null;end(false);return;case'brown':playBad();score=Math.max(0,~~(score*0.25));lost+=10;popup(-10,px,py);deduct(10,'brown');break;case'pink':playSpecial();score+=10000;if(res?.vngReward){pending+=res.vngReward;popup(res.vngReward,px,py)}break;case'black':playJackpot();score+=100000;if(res?.vngReward){pending+=res.vngReward;popup(res.vngReward,px,py)}break;case'rainbow':playRainbow();startRb();break}s.spec=null;s.exp=0;s.last=now;vis();return}
if(s.lit){s.lit=false;s.last=now;if(s.grn)playGood();else playPop();const res=await reportEvent('click',{isGreen:s.grn});if(res?.success&&res.vngReward!==undefined){score+=(s.grn?200:100);pending+=res.vngReward;popup(res.vngReward,px,py)}if(s.grn)s.grn=false;vis()}else{playClick()}}
function startRb(){rbMode=true;rbStart=Date.now();document.getElementById('rainbowInd').classList.add('active');rbSw=[];const c=document.getElementById('switches');c.innerHTML='';for(let i=0;i<NUM;i++){rbSw.push(mkSw(i));const e=document.createElement('div');e.className='switch off';e.dataset.i=i;e.onclick=ev=>click(i,ev);c.appendChild(e)}rbSw[~~(Math.random()*NUM)].lit=true;vis()}
function endRb(){rbMode=false;rbSw=[];document.getElementById('rainbowInd').classList.remove('active');const c=document.getElementById('switches');c.innerHTML='';for(let i=0;i<NUM;i++){sw[i].lit=false;sw[i].grn=false;sw[i].spec=null;const e=document.createElement('div');e.className='switch off';e.dataset.i=i;e.onclick=ev=>click(i,ev);c.appendChild(e)}sw[~~(Math.random()*NUM)].lit=true;vis()}
function getInt(){let int=rbMode?RB_INT:BASE_INT;pups=pups.filter(p=>Date.now()<p.exp);if(!pups.length)document.getElementById('powerupInd').classList.remove('active');else document.getElementById('powerupCount').textContent=pups.length;for(let p of pups)int*=p.f;return int}
function gameLoop(){if(over)return;const now=Date.now();if(rbMode){const rem=Math.max(0,Math.ceil((RB_DUR-(now-rbStart))/1000));document.getElementById('rainbowTimer').textContent=rem;if(now-rbStart>=RB_DUR)endRb()}if(!rbMode)for(let s of sw)if(s.spec&&now>=s.exp){s.spec=null;s.exp=0}
const int=getInt();if(now-lastR>=int){lastR=now;const act=rbMode?rbSw:sw;if(rbMode){const cands=act.filter(s=>!s.lit&&(now-s.last)>=int);if(cands.length){const shuf=[...cands].sort(()=>Math.random()-0.5);for(let s of shuf)if(Math.random()<RELIGHT){s.lit=true;break}}}else{const cands=sw.filter(s=>!s.lit&&!s.spec&&(now-s.last)>=int);if(cands.length){const shuf=[...cands].sort(()=>Math.random()-0.5);for(let s of shuf)if(Math.random()<RELIGHT){s.lit=true;s.grn=Math.random()<GREEN_C;break}}
const spCands=sw.filter(s=>!s.lit&&!s.spec);if(spCands.length){const r=Math.random(),c=[BLACK_C,BLACK_C+PINK_C,BLACK_C+PINK_C+BROWN_C,BLACK_C+PINK_C+BROWN_C+RAINBOW_C,BLACK_C+PINK_C+BROWN_C+RAINBOW_C+PURPLE_C,BLACK_C+PINK_C+BROWN_C+RAINBOW_C+PURPLE_C+BLUE_C,BLACK_C+PINK_C+BROWN_C+RAINBOW_C+PURPLE_C+BLUE_C+RED_C,BLACK_C+PINK_C+BROWN_C+RAINBOW_C+PURPLE_C+BLUE_C+RED_C+ORANGE_C];let t=null;if(r<c[0])t='black';else if(r<c[1])t='pink';else if(r<c[2])t='brown';else if(r<c[3])t='rainbow';else if(r<c[4])t='purple';else if(r<c[5])t='blue';else if(r<c[6])t='red';else if(r<c[7])t='orange';if(t){const s=spCands[~~(Math.random()*spCands.length)];s.spec=t;s.exp=now+SP_MIN+Math.random()*(SP_MAX-SP_MIN)}}}}vis();loop=requestAnimationFrame(gameLoop)}
async function end(stopped){over=true;if(loop)cancelAnimationFrame(loop);const tit=document.getElementById('overlayTitle'),vEl=document.getElementById('finalVng'),pen=document.getElementById('penaltyText'),det=document.getElementById('detailsText');let p=0,net=pending-lost;if(stopped){tit.textContent='STOPPED';tit.className='overlay-title stopped';p=V_STOP;net=pending-lost-V_STOP;pen.textContent='Stop fee: -'+V_STOP+' VNG'}else{tit.textContent='GAME OVER';tit.className='overlay-title lost';p=V_LOSE;net=pending-lost-V_LOSE;pen.textContent='Lose penalty: -'+V_LOSE+' VNG'}det.textContent='Earned: +'+Math.floor(pending)+' | Lost: -'+Math.floor(lost);vEl.textContent='Net: '+(net>=0?'+':'')+Math.floor(net)+' VNG';vEl.className='overlay-vng '+(net>=0?'positive':'negative');await endSess(p,net);document.getElementById('overlay').classList.add('active')}
async function stop(){if(over)return;if(!confirm('Stop? -15 VNG fee'))return;end(true)}
async function restart(){document.getElementById('overlay').classList.remove('active');document.getElementById('loading').classList.remove('hidden');score=0;pending=0;lost=0;over=false;pups=[];rbMode=false;rbSw=[];lastR=Date.now();document.getElementById('powerupInd').classList.remove('active');document.getElementById('rainbowInd').classList.remove('active');if(!await startSess()){alert('Failed');location.href='/voidgames/voidgames.html';return}initSw();document.getElementById('loading').classList.add('hidden');gameLoop()}
async function init(){if(!auth())return;if(!await startSess()){alert('Session failed');localStorage.removeItem('vg_user');location.href='/voidgames/voidgames.html';return}initSw();lastR=Date.now();document.getElementById('loading').classList.add('hidden');gameLoop()}
document.getElementById('restartBtn').onclick=restart;
document.getElementById('stopBtn').onclick=stop;
init();
    </script>
