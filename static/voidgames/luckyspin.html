@keyframes float{0%{opacity:1;transform:translateY(0)}60%{opacity:1}100%{opacity:0;transform:translateY(calc(-40px * var(--s)))}}

    <script>
const API='/api/vg',COST_PER_SPIN=10;
const RISK_CONFIG={
    low:{segments:[2,1,1,1,0,0,-1,-1],colors:['#4caf50','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ff9800','#ff5722','#f44336']},
    medium:{segments:[3,2,2,1,1,1,0,-1,-1,-2,-2,-3],colors:['#4caf50','#66bb6a','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ffa726','#ff7043','#f44336','#e53935','#c62828','#b71c1c']},
    high:{segments:[15,8,5,3,2,2,1,1,-1,-2,-3,-4,-5,-8,-10,-15],colors:['#ffd700','#4caf50','#66bb6a','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ffa726','#ff7043','#f44336','#e53935','#d32f2f','#c62828','#b71c1c','#880e0e','#5d0000']},
    extreme:{segments:[100,50,25,15,10,5,2,1,1,-1,-2,-5,-10,-15,-20,-25,-30,-40,-50,-60,-70,-80,-90,-100],colors:['#ffd700','#ffc107','#4caf50','#66bb6a','#8bc34a','#cddc39','#ffeb3b','#ffe082','#ffcc80','#ffab91','#ff8a65','#ff7043','#ff5722','#f44336','#e53935','#d32f2f','#c62828','#b71c1c','#a31515','#8b0000','#7b0000','#6b0000','#5b0000','#4b0000']}
};

let user,sessId,pending=0,spent=0,over=false,spinsLeft=0,isSpinning=false;
let currentRotation=0,config={risk:'medium',spins:10},autoMode=false,audioCtx;

function calcScale(){const vw=window.innerWidth,vh=window.innerHeight;const s=Math.min(vw/500,vh/650,1.4);document.documentElement.style.setProperty('--s',Math.max(0.5,s).toFixed(3))}
calcScale();window.addEventListener('resize',calcScale);

function auth(){const s=localStorage.getItem('vg_user');if(!s){location.href='/voidgames/voidgames.html';return false}user=JSON.parse(s);return true}

async function startSess(){try{const r=await fetch(API+'/game/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameType:'luckyspin'})});const d=await r.json();if(d.success){sessId=d.gameSessionId;return true}return false}catch{return false}}
async function configureGame(){try{const r=await fetch(API+'/game/configure',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,config:{risk:config.risk,totalSpins:config.spins}})});const d=await r.json();return d.success}catch{return false}}
async function deduct(a,r){if(a<=0)return;spent+=a;upd();try{await fetch(API+'/game/deduct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,amount:a,reason:r})})}catch{}}
async function reportEvent(type,data){try{const r=await fetch(API+'/game/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,eventType:type,eventData:data})});return r.json()}catch{return{success:false}}}
async function endSess(pen,netAmount){try{const r=await fetch(API+'/game/end',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:user.userId,sessionToken:user.sessionToken,gameSessionId:sessId,finalScore:0,netAmount:netAmount,penalty:pen})});sessId=null;return r.json()}catch{return{}}}

function popup(v,jackpot=false){const d=Math.floor(v);if(d===0&&!jackpot)return;const p=document.createElement('div');p.className='vng-popup '+(v>=0?'positive':'negative')+(jackpot?' jackpot':'');p.textContent=(v>=0?'+':'')+d;p.style.left='50%';p.style.top='40%';p.style.transform='translateX(-50%)';document.body.appendChild(p);setTimeout(()=>p.remove(),1200)}
function upd(){document.getElementById('pendingDisplay').textContent='+'+Math.floor(pending);document.getElementById('spentDisplay').textContent='-'+Math.floor(spent);document.getElementById('spinsDisplay').textContent=spinsLeft;document.getElementById('spinBtn').disabled=spinsLeft<=0||isSpinning||over}

function initSetup(){
    const u=()=>{document.getElementById('totalCost').textContent=config.spins*COST_PER_SPIN;document.getElementById('totalSpins').textContent=config.spins};
    document.querySelectorAll('#riskOptions .option').forEach(o=>{o.onclick=()=>{document.querySelectorAll('#riskOptions .option').forEach(x=>x.classList.remove('selected'));o.classList.add('selected');config.risk=o.dataset.risk;u()}});
    document.querySelectorAll('#spinOptions .option').forEach(o=>{o.onclick=()=>{document.querySelectorAll('#spinOptions .option').forEach(x=>x.classList.remove('selected'));o.classList.add('selected');config.spins=parseInt(o.dataset.spins);u()}});
    document.getElementById('startBtn').onclick=startGame;u();
}

async function startGame(){
    if(isSpinning)return;
    const c=config.spins*COST_PER_SPIN;
    spinsLeft=config.spins;pending=0;spent=0;over=false;currentRotation=0;
    document.getElementById('setupScreen').classList.add('hidden');document.getElementById('loading').classList.remove('hidden');
    if(!await startSess()){alert('Failed');document.getElementById('setupScreen').classList.remove('hidden');document.getElementById('loading').classList.add('hidden');return}
    if(!await configureGame()){alert('Failed to configure');document.getElementById('setupScreen').classList.remove('hidden');document.getElementById('loading').classList.add('hidden');return}
    await deduct(c,'spin_bundle');
    const b=document.getElementById('riskBadge');
    b.textContent=config.risk.toUpperCase()+' RISK';b.className='risk-badge '+config.risk;
    drawWheel();upd();document.getElementById('loading').classList.add('hidden');
    if(autoMode)triggerAuto();
}

function drawWheel(){
    const c=document.getElementById('wheelCanvas'),ctx=c.getContext('2d'),d=c.offsetWidth;
    c.width=d;c.height=d;
    const cx=d/2,cy=d/2,r=d/2-5,D=RISK_CONFIG[config.risk],cnt=D.segments.length,arc=(Math.PI*2)/cnt;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(currentRotation*Math.PI/180);
    for(let i=0;i<cnt;i++){
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,i*arc,(i+1)*arc);
        ctx.fillStyle=D.colors[i];ctx.fill();ctx.stroke();
        ctx.save();ctx.rotate(i*arc+arc/2);ctx.textAlign="right";ctx.fillStyle="#fff";
        ctx.font=`bold ${Math.max(10,d*0.045)}px Poppins`;
        ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=4;
        ctx.fillText(D.segments[i]+"x",r-15,5);ctx.restore();
    }
    ctx.restore();
}

async function spin(){
    if(over||isSpinning||spinsLeft<=0)return;
    isSpinning=true;spinsLeft--;upd();playClick();
    const res=await reportEvent('spin',{});
    if(!res||!res.success||res.targetIndex===undefined){spinsLeft++;isSpinning=false;upd();return}
    const tIdx=res.targetIndex,m=res.multiplier,vngChange=res.vngChange;
    const D=RISK_CONFIG[config.risk],cnt=D.segments.length,arc=360/cnt,noise=(Math.random()-0.5)*(arc*0.8);
    const tAng=(270-(tIdx*arc+arc/2))+(360*10)+noise;
    const curM=currentRotation%360,dist=tAng-curM,end=currentRotation+dist;
    animateSpin(currentRotation,end,3500,m,vngChange);
}

function animateSpin(s,e,d,m,vngChange){
    const st=performance.now(),cnt=RISK_CONFIG[config.risk].segments.length,arc=360/cnt;
    let lSeg=-1;
    function step(n){
        const el=n-st,p=Math.min(el/d,1),ea=1-Math.pow(1-p,3);
        currentRotation=s+(e-s)*ea;
        const deg=(360-((currentRotation%360)+90))%360,cSeg=Math.floor(((deg+360)%360)/arc);
        if(cSeg!==lSeg){playTick();lSeg=cSeg}
        drawWheel();
        if(p<1)requestAnimationFrame(step);else finishSpin(m,vngChange);
    }
    requestAnimationFrame(step);
}

function finishSpin(m,vngChange){
    isSpinning=false;
    if(vngChange<0){deduct(Math.abs(vngChange),'spin_negative');popup(vngChange);playLose()}
    else if(vngChange>0){pending+=vngChange;popup(vngChange,m>=10);playWin(m>=10)}
    else{playLose()}
    upd();
    if(spinsLeft<=0)setTimeout(()=>end(false),1500);
    else if(autoMode&&!over)setTimeout(spin,500);
}

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,t='sine',v=0.1){initAudio();if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type=t;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function playClick(){tone(400,0.1,'triangle')}
function playTick(){tone(800,0.03,'square',0.03)}
function playWin(j){if(j){tone(523,0.1);setTimeout(()=>tone(659,0.1),100);setTimeout(()=>tone(784,0.1),200);setTimeout(()=>tone(1047,0.4),300)}else{tone(523,0.1);setTimeout(()=>tone(659,0.1),100)}}
function playLose(){tone(150,0.3,'sawtooth')}

async function end(st){
    over=true;autoMode=false;document.getElementById('autoToggle').classList.remove('active');
    const t=document.getElementById('overlayTitle'),v=document.getElementById('finalVng'),p=document.getElementById('penaltyText'),d=document.getElementById('detailsText');
    let pen=0,net=pending-spent;
    if(st){t.textContent='STOPPED';t.className='overlay-title stopped';pen=15;net-=15;p.textContent='Stop fee: -15 VNG'}
    else{if(net>0){t.textContent='PROFIT!';t.className='overlay-title win'}else{t.textContent='GAME FINISHED';t.className='overlay-title'}p.textContent=''}
    d.textContent='Won: +'+Math.floor(pending)+' | Spent: -'+Math.floor(spent);
    v.textContent='Net: '+(net>=0?'+':'')+Math.floor(net)+' VNG';
    v.className='overlay-vng '+(net>=0?'positive':'negative');
    await endSess(pen,net);
    document.getElementById('overlay').classList.add('active');
}

function triggerAuto(){if(autoMode&&!isSpinning&&!over&&spinsLeft>0)spin()}
function toggleAuto(){autoMode=!autoMode;document.getElementById('autoToggle').classList.toggle('active',autoMode);triggerAuto()}
function playAgain(){document.getElementById('overlay').classList.remove('active');document.getElementById('setupScreen').classList.remove('hidden');initSetup()}

async function init(){if(!auth())return;calcScale();initSetup();document.getElementById('loading').classList.add('hidden');document.getElementById('spinBtn').onclick=()=>{initAudio();spin()};document.getElementById('spinBtnCenter').onclick=()=>{initAudio();spin()};document.getElementById('playAgainBtn').onclick=playAgain;document.getElementById('autoToggle').onclick=toggleAuto}
init();
    </script>
</body>
</html>
