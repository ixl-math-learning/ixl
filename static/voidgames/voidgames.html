const API_BASE = '/api/vg';
let currentUser = null;
let balanceInterval = null;
let leaderboardInterval = null;
let activityInterval = null;
let deviceFingerprint = null;
const LOCAL_ACCOUNTS_KEY = 'vg_device_accounts';

function getLocalAccounts() {
    try { return JSON.parse(localStorage.getItem(LOCAL_ACCOUNTS_KEY) || '[]'); } catch { return []; }
}
function addLocalAccount(username) {
    const accounts = getLocalAccounts();
    if (!accounts.includes(username)) { accounts.push(username); localStorage.setItem(LOCAL_ACCOUNTS_KEY, JSON.stringify(accounts)); }
}
function canCreateAccount() {
    const accounts = getLocalAccounts();
    if (accounts.includes('__blocked__')) return false;
    return accounts.length < 2;
}

async function generateDeviceFingerprint() {
    const components = [];
    components.push(navigator.userAgent);
    components.push(navigator.language);
    components.push(screen.width + 'x' + screen.height);
    components.push(screen.colorDepth);
    components.push(new Date().getTimezoneOffset());
    components.push(navigator.hardwareConcurrency || 'unknown');
    components.push(navigator.platform);
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('VoidGames fingerprint', 2, 2);
        components.push(canvas.toDataURL().slice(-50));
    } catch (e) { components.push('canvas-error'); }
    const fingerprint = components.join('|');
    const encoder = new TextEncoder();
    const data = encoder.encode(fingerprint);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

function updateBalanceDisplay(vng) {
    const display = document.getElementById('displayBalance');
    const formatted = formatNumber(vng);
    display.textContent = formatted;
    if (vng >= 1000000) display.style.fontSize = '2.2rem';
    else if (vng >= 100000) display.style.fontSize = '2.5rem';
    else if (vng >= 10000) display.style.fontSize = '2.8rem';
    else display.style.fontSize = '3rem';
}

function timeAgo(timestamp) {
    const now = Date.now();
    const diff = now - timestamp;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    if (days > 0) return days + 'd ago';
    if (hours > 0) return hours + 'h ago';
    if (minutes > 0) return minutes + 'm ago';
    if (seconds > 10) return seconds + 's ago';
    return 'just now';
}

async function loadActivityFeed() {
    const container = document.getElementById('activityFeed');
    try {
        const res = await fetch(API_BASE + '/activity-feed?limit=30');
        const data = await res.json();
        if (data.success && data.feed.length > 0) {
            container.innerHTML = data.feed.map(item => {
                let icon = '📢';
                let iconClass = 'account';
                if (item.type === 'game_win') { icon = '🎉'; iconClass = 'win'; }
                else if (item.type === 'game_loss') { icon = '💔'; iconClass = 'loss'; }
                else if (item.type === 'account_created') { icon = '✨'; iconClass = 'account'; }
                else if (item.type === 'leaderboard_move') { icon = '🏆'; iconClass = 'leaderboard'; }
                return `<li class="activity-item"><div class="activity-icon ${iconClass}">${icon}</div><div class="activity-message">${escapeHtml(item.message)}</div><div class="activity-time">${timeAgo(item.timestamp)}</div></li>`;
            }).join('');
        } else {
            container.innerHTML = '<li class="no-data">No activity yet</li>';
        }
    } catch (err) {
        container.innerHTML = '<li class="no-data">Failed to load activity</li>';
    }
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
        clearErrors();
    });
});

function clearErrors() {
    document.querySelectorAll('.error-msg, .success-msg').forEach(el => { el.style.display = 'none'; el.textContent = ''; });
}
function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}
function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}

document.getElementById('signupUsername').addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^a-zA-Z]/g, ''); });
document.getElementById('loginUsername').addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^a-zA-Z]/g, ''); });

document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    const btn = document.getElementById('signupBtn');
    if (!username || !email || !password) { showError('signupError', 'All fields required'); return; }
    if (!/^[a-zA-Z]+$/.test(username)) { showError('signupError', 'Username can only contain English letters (a-z, A-Z)'); return; }
    if (password !== confirm) { showError('signupError', 'Passwords do not match'); return; }
    if (password.length < 6) { showError('signupError', 'Password must be at least 6 characters'); return; }
    if (!canCreateAccount()) { showError('signupError', 'Maximum 2 accounts per device reached'); return; }
    btn.disabled = true;
    btn.textContent = 'Creating...';
    try {
        if (!deviceFingerprint) deviceFingerprint = await generateDeviceFingerprint();
        const res = await fetch(API_BASE + '/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password, deviceFingerprint }) });
        const data = await res.json();
        if (data.success) {
            addLocalAccount(username);
            showSuccess('signupSuccess', 'Account created!');
            localStorage.setItem('vg_user', JSON.stringify({ userId: data.userId, sessionToken: data.sessionToken, username: data.username }));
            currentUser = { userId: data.userId, sessionToken: data.sessionToken, username: data.username, vng: data.vng };
            setTimeout(() => { updateUI(); loadLeaderboard(); loadActivityFeed(); startPolling(); }, 500);
        } else {
            if (data.deviceLimitReached) addLocalAccount('__blocked__');
            showError('signupError', data.error || 'Signup failed');
        }
    } catch (err) { showError('signupError', 'Connection error'); }
    btn.disabled = false;
    btn.textContent = 'Create Account';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    if (!username || !password) { showError('loginError', 'All fields required'); return; }
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    try {
        const res = await fetch(API_BASE + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('vg_user', JSON.stringify({ userId: data.userId, sessionToken: data.sessionToken, username: data.username }));
            currentUser = { userId: data.userId, sessionToken: data.sessionToken, username: data.username, vng: data.vng };
            updateUI();
            loadLeaderboard();
            loadActivityFeed();
            startPolling();
        } else { showError('loginError', data.error || 'Login failed'); }
    } catch (err) { showError('loginError', 'Connection error'); }
    btn.disabled = false;
    btn.textContent = 'Login';
});

function logout() {
    localStorage.removeItem('vg_user');
    currentUser = null;
    stopPolling();
    updateUI();
    document.getElementById('signupForm').reset();
    document.getElementById('loginForm').reset();
}

function updateUI() {
    const authPanel = document.getElementById('authPanel');
    const userPanel = document.getElementById('userPanel');
    if (currentUser) {
        authPanel.classList.add('hidden');
        userPanel.classList.add('active');
        document.getElementById('displayUsername').textContent = currentUser.username;
        updateBalanceDisplay(currentUser.vng || 0);
    } else {
        authPanel.classList.remove('hidden');
        userPanel.classList.remove('active');
    }
}

async function refreshBalance() {
    if (!currentUser) return;
    try {
        const res = await fetch(API_BASE + '/balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, sessionToken: currentUser.sessionToken }) });
        const data = await res.json();
        if (data.success) { currentUser.vng = data.vng; updateBalanceDisplay(data.vng); }
    } catch (err) {}
}

async function loadLeaderboard() {
    const container = document.getElementById('leaderboard');
    try {
        const res = await fetch(API_BASE + '/leaderboard');
        const data = await res.json();
        if (data.success && data.leaderboard.length > 0) {
            container.innerHTML = data.leaderboard.map((user, i) => {
                let rankClass = '';
                if (i === 0) rankClass = 'gold';
                else if (i === 1) rankClass = 'silver';
                else if (i === 2) rankClass = 'bronze';
                return `<li class="leaderboard-item"><span class="lb-rank ${rankClass}">#${i + 1}</span><span class="lb-name">${escapeHtml(user.username)}</span><span class="lb-coins">${formatNumber(user.vng)} VNG</span></li>`;
            }).join('');
        } else { container.innerHTML = '<li class="no-data">No players yet</li>'; }
    } catch (err) { container.innerHTML = '<li class="no-data">Failed to load</li>'; }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function startPolling() {
    stopPolling();
    balanceInterval = setInterval(refreshBalance, 5000);
    leaderboardInterval = setInterval(loadLeaderboard, 15000);
    activityInterval = setInterval(loadActivityFeed, 5000);
}

function stopPolling() {
    if (balanceInterval) clearInterval(balanceInterval);
    if (leaderboardInterval) clearInterval(leaderboardInterval);
    if (activityInterval) clearInterval(activityInterval);
    balanceInterval = null;
    leaderboardInterval = null;
    activityInterval = null;
}

document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && currentUser) { refreshBalance(); loadLeaderboard(); loadActivityFeed(); }
});

async function checkSession() {
    const saved = localStorage.getItem('vg_user');
    if (!saved) return;
    try {
        const user = JSON.parse(saved);
        const res = await fetch(API_BASE + '/balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: user.userId, sessionToken: user.sessionToken }) });
        const data = await res.json();
        if (data.success) { currentUser = { ...user, vng: data.vng }; updateUI(); startPolling(); }
        else { localStorage.removeItem('vg_user'); }
    } catch (err) { localStorage.removeItem('vg_user'); }
}

checkSession();
loadLeaderboard();
loadActivityFeed();
generateDeviceFingerprint().then(fp => { deviceFingerprint = fp; });
    </script>
</body>
