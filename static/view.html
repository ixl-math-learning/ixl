        function loadContent() {

                finalUrl = gameUrl;
                if (title) {

                }

                showError(isApp ? 'No app specified' : 'No game specified');

};

        function buildGameUrl(game) { var encodedTitle = btoa(game.title); var queryString = 'game=' + encodeURIComponent(game.link) + '&title=' + encodedTitle; var encodedQuery = btoa(queryString).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); return '/view.html?' + encodedQuery; }
        function shuffleArray(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp; } return arr; }

        // Server selection for recommended games
        function ssGetProxyType(link) {
            if (typeof link !== 'string' || !link) return null;
            if (link.startsWith('/reading/')) return null;
            if (link.startsWith('/local games/') || link.startsWith('/local%20games/')) return null;
            if (link.startsWith('/documents/')) return null;

            if (link.startsWith('/onlylocal/html/')) return 'onlylocal';

        function ssGetRawUrl(link, proxyType) {

        async function loadRecommendedGames() {
            debugLog('Loading recommended games');
            var games = [];
            var currentTitle = gameTitle.textContent;
            try {
                var response = await fetch('/api/popular-games');
                if (response.ok) {
                    var popularData = await response.json();
                    games = popularData.map(function(item) {
                        return gamesData.find(function(g) { return g.title === item.title; });
                    }).filter(function(g) {
                        return g && g.title !== currentTitle && g.imgSrc;
                    });
                }
            } catch (e) {
                debugLog('Could not fetch popular games');
            }
            if (games.length < 3) {
                var additionalGames = gamesData.filter(function(g) {
                    return g.title !== currentTitle && g.imgSrc && !games.find(function(eg) { return eg && eg.title === g.title; });
                });
                shuffleArray(additionalGames);
                games = games.concat(additionalGames.slice(0, 3 - games.length));
            }
            shuffleArray(games);
            games = games.slice(0, 3);
            if (games.length >= 3) {
                renderRecommendedGames(games);
            } else {
                document.getElementById('imageGallery').classList.remove('visible');
            }
        }

        function renderRecommendedGames(games) {

            document.getElementById('bigGameTitle').textContent = games[0].title;
            document.getElementById('bigGame').onclick = function() { navigateToGame(games[0]); };

            var small1Img = document.getElementById('smallGame1Img');
            small1Img.src = games[1].imgSrc || '/img/gameimg/placeholder.png';
            small1Img.onerror = function() { this.src = '/img/gameimg/placeholder.png'; };
            document.getElementById('smallGame1Title').textContent = games[1].title;
            document.getElementById('smallGame1').onclick = function() { navigateToGame(games[1]); };

            var small2Img = document.getElementById('smallGame2Img');
            small2Img.src = games[2].imgSrc || '/img/gameimg/placeholder.png';
            small2Img.onerror = function() { this.src = '/img/gameimg/placeholder.png'; };
            document.getElementById('smallGame2Title').textContent = games[2].title;
            document.getElementById('smallGame2').onclick = function() { navigateToGame(games[2]); };
            document.getElementById('imageGallery').classList.add('visible');
        }

        function getDeviceInfo() {
            var ua = navigator.userAgent;
            var device = 'Unknown', browser = 'Unknown', os = 'Unknown';
            if (/iPhone/.test(ua)) device = 'iPhone'; else if (/iPad/.test(ua)) device = 'iPad'; else if (/Android/.test(ua)) device = /Mobile/.test(ua) ? 'Android Phone' : 'Android Tablet'; else if (/Windows/.test(ua)) device = 'Windows PC'; else if (/Macintosh/.test(ua)) device = 'Mac'; else if (/Linux/.test(ua)) device = 'Linux PC'; else if (/CrOS/.test(ua)) device = 'Chromebook';
            if (/Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome'; else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari'; else if (/Firefox/.test(ua)) browser = 'Firefox'; else if (/Edg/.test(ua)) browser = 'Edge';
            if (/Windows NT 10/.test(ua)) os = 'Windows 10/11'; else if (/Mac OS X/.test(ua)) os = 'macOS'; else if (/Android/.test(ua)) os = 'Android'; else if (/iOS|iPhone|iPad/.test(ua)) os = 'iOS'; else if (/Linux/.test(ua)) os = 'Linux'; else if (/CrOS/.test(ua)) os = 'Chrome OS';
            return { device: device, browser: browser, os: os, screenWidth: window.screen.width, screenHeight: window.screen.height, viewportWidth: window.innerWidth, viewportHeight: window.innerHeight, pixelRatio: window.devicePixelRatio || 1, language: navigator.language, online: navigator.onLine };
        }

        async function captureScreenshot() {
            try {
                debugLog('Requesting screen capture permission...');
                var stream = await navigator.mediaDevices.getDisplayMedia({ video: { mediaSource: 'screen', cursor: 'never' }, audio: false, preferCurrentTab: true });
                var video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                await new Promise(function(resolve) { video.onloadedmetadata = function() { video.play(); resolve(); }; });
                await new Promise(function(resolve) { setTimeout(resolve, 200); });
                var canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                stream.getTracks().forEach(function(track) { track.stop(); });
                var maxWidth = 1280;
                var maxHeight = 720;
                var ratio = Math.min(maxWidth / canvas.width, maxHeight / canvas.height, 1);
                if (ratio < 1) { var resizedCanvas = document.createElement('canvas'); resizedCanvas.width = canvas.width * ratio; resizedCanvas.height = canvas.height * ratio; var resizedCtx = resizedCanvas.getContext('2d'); resizedCtx.drawImage(canvas, 0, 0, resizedCanvas.width, resizedCanvas.height); canvas = resizedCanvas; }
                var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                debugLog('Screenshot captured, size:', Math.round(dataUrl.length / 1024) + 'KB');
                return dataUrl;
            } catch (e) { console.warn('Screen capture failed or denied:', e.message); return null; }
        }

        async function submitFeedback(working) {
            if (feedbackSubmitted) return;
            if (working) { feedbackButtons.style.display = 'none'; feedbackSuccess.classList.add('show'); feedbackSubmitted = true; return; }
            feedbackYes.disabled = true; feedbackNo.disabled = true;
            debugLog('Starting bug report submission...');
            debugLog('Console history entries:', window.voidConsoleHistory.length);
            var screenshot = null;
            try { screenshot = await captureScreenshot(); } catch (e) { console.warn('Screenshot skipped:', e.message); }
            capturingOverlay.querySelector('.capturing-text').textContent = 'Submitting report...';
            capturingOverlay.classList.add('show');
            try {
                var payload = { title: gameTitle.textContent || 'Unknown', gameUrl: parsedParams.game || parsedParams.app || 'Unknown', isApp: isApp, device: getDeviceInfo(), consoleHistory: window.voidConsoleHistory.slice(-100), screenshot: screenshot, timestamp: new Date().toISOString(), pageUrl: window.location.href, iframeUrl: iframe.src || 'Unknown', referrer: document.referrer || 'Direct', sessionDuration: Math.round((Date.now() - window.voidStartTime) / 1000) };
                debugLog('Submitting payload with', payload.consoleHistory.length, 'console entries');
                var response = await fetch('/api/report-issue', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                capturingOverlay.classList.remove('show');
                if (response.ok) { feedbackButtons.style.display = 'none'; feedbackSuccess.textContent = 'Report submitted! Reloading game...'; feedbackSuccess.classList.add('show'); feedbackSubmitted = true; debugLog('Bug report submitted successfully'); setTimeout(function() { iframe.src = iframe.src; }, 800); }
                else if (response.status === 429) { feedbackButtons.style.display = 'none'; feedbackSuccess.textContent = 'Already submitted recently.'; feedbackSuccess.classList.add('show'); feedbackSubmitted = true; }
                else { throw new Error('Server returned ' + response.status); }
            } catch (e) { console.error('Submit failed:', e); capturingOverlay.classList.remove('show'); feedbackYes.disabled = false; feedbackNo.disabled = false; feedbackSuccess.textContent = 'Failed to submit. Please try again.'; feedbackSuccess.classList.add('show'); setTimeout(function() { feedbackSuccess.classList.remove('show'); }, 3000); }
        }

        feedbackYes.addEventListener('click', function() { submitFeedback(true); });
        feedbackNo.addEventListener('click', function() { submitFeedback(false); });

        function focusIframe() {
            setTimeout(function() {
                iframe.focus();
                try { iframe.contentWindow.focus(); } catch(e) {}
            }, 100);
        }

        var escHoldTimer = null;
        var ESC_HOLD_MS = 600;

        document.addEventListener('fullscreenchange', function() {
            if (document.fullscreenElement) {
                focusIframe();
                if (navigator.keyboard && navigator.keyboard.lock) {
                    navigator.keyboard.lock(['Escape']).catch(function() {});
                }
            } else {
                if (navigator.keyboard && navigator.keyboard.unlock) {
                    navigator.keyboard.unlock();
                }
                if (escHoldTimer) { clearTimeout(escHoldTimer); escHoldTimer = null; }
            }
        });

        document.addEventListener('webkitfullscreenchange', function() {
            if (document.webkitFullscreenElement) focusIframe();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !e.repeat && (document.fullscreenElement || document.webkitFullscreenElement)) {
                e.preventDefault();
                if (!escHoldTimer) {
                    escHoldTimer = setTimeout(function() {
                        escHoldTimer = null;
                        if (document.exitFullscreen) document.exitFullscreen();
                        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    }, ESC_HOLD_MS);
                }
            }
        });

        document.addEventListener('keyup', function(e) {
            if (e.key === 'Escape' && escHoldTimer) {
                clearTimeout(escHoldTimer);
                escHoldTimer = null;
            }
        });

        embedContainer.addEventListener('click', function(e) {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (e.target === iframe || e.target.closest('.embed-container > div:first-child')) {
                    focusIframe();
                }
            }
        });

        var isSimulatedFullscreen = false;

        function enterSimulatedFullscreen() {
            isSimulatedFullscreen = true;
            embedContainer.classList.add('simulated-fullscreen');
            document.body.classList.add('simulated-fs-active');
            if (window.scrollTo) window.scrollTo(0, 0);
            focusIframe();
        }

        function exitSimulatedFullscreen() {
            if (!isSimulatedFullscreen) return;
            isSimulatedFullscreen = false;
            embedContainer.classList.remove('simulated-fullscreen');
            document.body.classList.remove('simulated-fs-active');
        }

        // Detect iOS (iPhone/iPad) — no Fullscreen API support on arbitrary elements
        var isIOSDevice = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        fullscreenBtn.addEventListener('click', function() {
            // Exit: check all fullscreen modes
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                return;
            }
            if (isSimulatedFullscreen) {
                exitSimulatedFullscreen();
                return;
            }

            // iOS always uses simulated fullscreen
            if (isIOSDevice) {
                enterSimulatedFullscreen();
                return;
            }

            var isChromebook = /CrOS/.test(navigator.userAgent);
            if (isChromebook) {
                setTimeout(function() {
                    if (embedContainer.requestFullscreen) embedContainer.requestFullscreen().then(focusIframe).catch(function(e) { console.warn('Fullscreen failed:', e); enterSimulatedFullscreen(); });
                    else if (embedContainer.webkitRequestFullscreen) { embedContainer.webkitRequestFullscreen(); focusIframe(); }
                    else { enterSimulatedFullscreen(); }
                }, 100);
            } else {
                if (embedContainer.requestFullscreen) {
                    embedContainer.requestFullscreen().then(focusIframe).catch(function(e) {
                        console.warn('Fullscreen API failed, using simulated:', e);
                        enterSimulatedFullscreen();
                    });
                } else if (embedContainer.webkitRequestFullscreen) {
                    try { embedContainer.webkitRequestFullscreen(); focusIframe(); } catch(e) { enterSimulatedFullscreen(); }
                } else {
                    enterSimulatedFullscreen();
                }
            }
        });

        // Allow exiting simulated fullscreen with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isSimulatedFullscreen) {
                exitSimulatedFullscreen();
            }
        });

        // Exit simulated fullscreen if native fullscreen events fire (shouldn't happen, but safety)
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && isSimulatedFullscreen) exitSimulatedFullscreen();
        });
        document.addEventListener('webkitfullscreenchange', function() {
            if (!document.webkitFullscreenElement && isSimulatedFullscreen) exitSimulatedFullscreen();
        });

        refreshBtn.addEventListener('click', function() { debugLog('Refreshing game'); iframe.src = iframe.src; });
        showGameBtn.addEventListener('click', function() {
            hideLoadingScreen();
            if (checkInterval) clearInterval(checkInterval);
            if (!contentLoaded) { loadContent(); }
            else if (usingScramjet && iframe.src) { iframe.src = iframe.src; }
        });
        document.getElementById('retryBtn').addEventListener('click', function() { location.reload(); });
        setTimeout(function() { showGameBtn.style.display = 'block'; loadingText.textContent = 'Taking longer than expected...'; }, 4000);

        // Listen for transport-reconnect signals from SW (e.g. when WISP WebSocket drops / MuxTaskEnded)
        if (navigator.serviceWorker) {
            var reconnecting = false;
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'transport-reconnect' && !reconnecting) {
                    reconnecting = true;
                    debugLog('SW signaled transport-reconnect, re-establishing WISP...');
                    try {
                        var conn = window.__vnBareConn || new BareMux.BareMuxConnection("/~r/2/worker.js");
                        if (!window.__vnBareConn) window.__vnBareConn = conn;
                        var wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/~r/9/";
                        conn.setTransport("/~r/3/index.mjs", [{ wisp: wispUrl }]).then(function() {
                            debugLog('Transport reconnected');
                            reconnecting = false;
                        }).catch(function() {
                            reconnecting = false;
                        });
                    } catch (e) {
                        reconnecting = false;
                    }
                }
            });
        }

        // Run immediately — module scripts already execute after DOM parsing.
        // Do NOT use window.load — it waits for ALL resources (blocked ad scripts,
        // fonts, images) which can hang forever if Lightspeed blocks a request.
        (async function() {
            debugLog('Initializing (module ready)...');
            parsedParams = parseUrlParameters();
            var gameUrl = parsedParams.game || '';
            var appUrl = parsedParams.app || '';
            var contentUrl = gameUrl || appUrl;
            var needsScramjet = gameUrl.startsWith('__SCRAMJET__') || appUrl.startsWith('__SCRAMJET__');

            // Local games (start with / but not proxy prefixes) don't need proxy init at all.
            // Load them immediately without waiting for SW registration or transport setup.
            var isLocalContent = contentUrl && contentUrl.startsWith('/') && !contentUrl.startsWith('/~r/p/') && !contentUrl.startsWith('/~/px/') && !contentUrl.startsWith('__SCRAMJET__');

            if (isLocalContent) {
                debugLog('Local content detected, skipping proxy init');
                loadContent();
                return;
            }

            var titleParam = parsedParams.title || '';
            if (titleParam) {
                var decoded = '';
                try { decoded = atob(titleParam); } catch(e) { decoded = titleParam; }
                if (decoded) {
                    var matchedItem = gamesData.find(function(g) { return g.title === decoded; }) ||
                                      appsData.find(function(a) { return a.title === decoded; });
                    if (matchedItem && matchedItem.ipcloak) {
                        try {
                            var ipcloakWispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/~r/a/";
                            var conn = window.__vnBareConn || new BareMux.BareMuxConnection("/~r/2/worker.js");
                            if (!window.__vnBareConn) window.__vnBareConn = conn;
                            await conn.setTransport("/~r/3/index.mjs", [{ wisp: ipcloakWispUrl }]);
                            console.log('Using residential proxy (ipcloak) for:', decoded);
                        } catch (e) { console.warn('ipcloak transport failed:', e); }
                    }
                }
            }

            var proxyReady = false;
            try {
                if (needsScramjet) {
                    proxyReady = await initializeScramjet();
                } else {
                    proxyReady = await initializeUV();
                }
            } catch (e) {
                console.error('Proxy init error:', e);
            }

            loadContent();
        })();
    </script>
