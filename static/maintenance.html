<body>
<div class="container">
    <div class="logo">🔧</div>
    <h1>Website Under Maintenance</h1>
    <p class="subtitle">We’re performing upgrades to improve your experience.<br>Check back soon.</p>
    <div>
        <label class="form-label" for="password">Testing Access</label>
        <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="off">
        <button type="button" id="submitBtn" class="submit-btn">Access Website</button>
        <div id="errorMessage" class="error-message"></div>
    </div>
    <div class="status-info">
        <strong>Status:</strong> Maintenance in progress<br>
        <strong>Expected Duration:</strong> Short downtime<br>
        <strong>Contact:</strong> Please check back later
    </div>
</div>
<script>
async function submitPassword() {
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');
    const container = document.querySelector('.container');
    if (!password) return showError('Please enter a password');
    container.classList.add('loading');
    submitBtn.textContent = 'Verifying...';
    errorDiv.style.display = 'none';
    try {
        const response = await fetch('/api/maintenance/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password })
        });
        const result = await response.json();
        if (result.success) {
            document.cookie = 'maintenance_session=' + result.sessionId + '; path=/; max-age=3600';
            submitBtn.textContent = 'Access Granted! Redirecting...';
            submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            setTimeout(() => window.location.href = '/index.html', 1500);
        } else {
            showError('Incorrect password. Please try again.');
            container.classList.remove('loading');
            submitBtn.textContent = 'Access Website';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    } catch {
        showError('Connection error. Please try again.');
        container.classList.remove('loading');
        submitBtn.textContent = 'Access Website';
    }
}
function showError(msg) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
}
document.getElementById('submitBtn').addEventListener('click', submitPassword);
document.getElementById('password').addEventListener('keypress', e => {
    if (e.key === 'Enter') submitPassword();
});
document.getElementById('password').focus();
</script>
