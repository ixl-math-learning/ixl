<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Void Network PRO</title>
<link rel="icon" href="/img/voidnetwork.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/matte-theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
    background:var(--matte-bg-base);
    color:var(--matte-text-primary);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
    position:relative;
    user-select:none;
}
body::before{
    content:'';
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,255,255,0.015) 0%, transparent 100%);
    pointer-events:none;
    z-index:0;
}
.card{
    position:relative;
    z-index:1;
    background:var(--matte-bg-card);
    border:1px solid var(--matte-border-default);
    border-radius:var(--matte-radius-xl);
    padding:3rem 2.5rem;
    max-width:480px;
    width:100%;
    text-align:center;
    box-shadow:var(--matte-shadow-lg);
}
.pro-badge{
    display:inline-flex;
    align-items:center;
    gap:.5rem;
    background:var(--matte-bg-hover);
    color:var(--matte-text-primary);
    font-size:.7rem;
    font-weight:600;
    padding:.4rem 1.2rem;
    border-radius:20px;
    letter-spacing:3px;
    margin-bottom:1.5rem;
    border:1px solid var(--matte-border-hover);
}
.pro-badge svg{width:16px;height:16px;opacity:0.7}
h1{
    font-size:1.8rem;
    font-weight:700;
    margin-bottom:.75rem;
    letter-spacing:-0.02em;
    background:linear-gradient(180deg, #4a4a4a 0%, #ffffff 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:none;
}
p{
    font-size:.88rem;
    color:var(--matte-text-secondary);
    line-height:1.7;
    margin-bottom:.5rem;
    font-weight:300;
    letter-spacing:0.2px;
}
.sub{
    font-size:.78rem;
    color:var(--matte-text-muted);
    margin-bottom:1.75rem;
    font-weight:300;
}
.btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:.6rem;
    width:100%;
    padding:.9rem 1.5rem;
    border-radius:var(--matte-radius-md);
    font-family:inherit;
    font-size:.88rem;
    font-weight:500;
    text-decoration:none;
    cursor:pointer;
    transition:all 0.2s ease;
    border:none;
    margin-top:.6rem;
    letter-spacing:0.2px;
}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.discord-btn{
    background:var(--matte-bg-hover);
    color:var(--matte-text-primary);
    border:1px solid var(--matte-border-hover);
    box-shadow:var(--matte-shadow-sm);
}
.discord-btn:hover:not(:disabled){
    background:#1a1a1a;
    border-color:rgba(255,255,255,0.15);
    box-shadow:var(--matte-shadow-md);
}
.discord-btn svg{flex-shrink:0;opacity:0.7}
.btn.secondary{
    background:var(--matte-bg-elevated);
    border:1px solid var(--matte-border-subtle);
    color:var(--matte-text-muted);
    font-weight:300;
}
.btn.secondary:hover:not(:disabled){
    background:var(--matte-bg-card);
    border-color:var(--matte-border-default);
    color:var(--matte-text-secondary);
}
.btn.purchase-btn{
    background:rgba(99,102,241,0.1);
    border:1px solid rgba(99,102,241,0.2);
    color:rgba(139,142,255,0.9);
    font-weight:500;
}
.btn.purchase-btn:hover:not(:disabled){
    background:rgba(99,102,241,0.15);
    border-color:rgba(99,102,241,0.3);
}
.btn.cancel-btn{
    background:rgba(255,40,40,0.08);
    border:1px solid rgba(255,40,40,0.15);
    color:rgba(255,100,100,0.8);
    font-weight:400;
    font-size:.8rem;
    margin-top:1.25rem;
}
.btn.cancel-btn:hover:not(:disabled){
    background:rgba(255,40,40,0.12);
    border-color:rgba(255,40,40,0.25);
    color:rgba(255,120,120,0.9);
}
.btn.cancel-btn svg{flex-shrink:0;width:16px;height:16px}
.btn.logout-btn{
    background:transparent;
    border:1px solid var(--matte-border-subtle);
    color:var(--matte-text-muted);
    font-size:.78rem;
    font-weight:300;
    margin-top:.5rem;
}
.btn.logout-btn:hover{
    border-color:var(--matte-border-default);
    color:var(--matte-text-secondary);
}
.status-icon{font-size:3rem;margin-bottom:1.25rem}
.status-icon.cancel{color:rgba(255,80,80,0.7)}
.status-icon.success{color:rgba(255,255,255,0.8)}
.err{
    background:rgba(255,40,40,0.05);
    border:1px solid rgba(255,40,40,0.1);
    color:rgba(255,100,100,0.7);
    padding:.8rem;
    border-radius:var(--matte-radius-sm);
    font-size:.8rem;
    margin-bottom:1.25rem;
    font-weight:300;
}
.discord-label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.4rem;
    font-size:.72rem;
    color:var(--matte-text-muted);
    margin-top:1.25rem;
    font-weight:300;
}
.discord-label svg{opacity:0.3}
.manual-btn{
    background:rgba(255,40,40,0.08);
    border:1px solid rgba(255,40,40,0.15);
    color:rgba(255,100,100,0.8);
    font-weight:400;
    font-size:.8rem;
    margin-top:1.25rem;
}
.manual-btn:hover{
    background:rgba(255,40,40,0.12);
    border-color:rgba(255,40,40,0.25);
    color:rgba(255,120,120,0.9);
}
.manual-btn svg{flex-shrink:0;width:16px;height:16px}
.overlay{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.85);
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
}
.popup{
    background:var(--matte-bg-elevated);
    border:1px solid var(--matte-border-default);
    border-radius:var(--matte-radius-xl);
    padding:2.5rem 2rem;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 32px 64px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.03);
}
.popup .warn-icon{
    color:rgba(255,180,40,0.8);
    margin-bottom:1rem;
}
.popup .warn-icon svg{width:40px;height:40px}
.popup h2{
    font-size:1.2rem;
    font-weight:600;
    color:var(--matte-text-primary);
    margin-bottom:1rem;
    letter-spacing:-0.01em;
}
.popup p{
    font-size:.82rem;
    color:var(--matte-text-secondary);
    line-height:1.7;
    margin-bottom:1.25rem;
    font-weight:300;
}
.popup .btn-row{
    display:flex;
    gap:.6rem;
    margin-top:.5rem;
}
.popup .btn-row .btn{
    flex:1;
    margin-top:0;
    padding:.8rem 1rem;
    font-size:.82rem;
}
.btn.green-btn{
    background:rgba(34,197,94,0.1);
    border:1px solid rgba(34,197,94,0.2);
    color:rgba(34,197,94,0.9);
}
.btn.green-btn:hover:not(:disabled){
    background:rgba(34,197,94,0.15);
    border-color:rgba(34,197,94,0.3);
}
.btn.green-btn svg{flex-shrink:0;width:16px;height:16px}
.btn.red-btn{
    background:rgba(255,40,40,0.08);
    border:1px solid rgba(255,40,40,0.15);
    color:rgba(255,100,100,0.8);
}
.btn.red-btn:hover:not(:disabled){
    background:rgba(255,40,40,0.12);
    border-color:rgba(255,40,40,0.25);
}
.btn.red-btn svg{flex-shrink:0;width:16px;height:16px}
.dash-info{
    text-align:left;
    background:var(--matte-bg-elevated);
    border:1px solid var(--matte-border-subtle);
    border-radius:var(--matte-radius-md);
    padding:1.25rem;
    margin:1.25rem 0;
}
.dash-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:.5rem 0;
}
.dash-row:not(:last-child){border-bottom:1px solid var(--matte-border-subtle)}
.dash-label{font-size:.78rem;color:var(--matte-text-muted);font-weight:300}
.dash-value{font-size:.82rem;color:var(--matte-text-primary);font-weight:500}
.dash-value.active{color:rgba(34,197,94,0.9)}
.dash-value.cancelling{color:rgba(255,180,40,0.9)}
.loading-spinner{
    display:inline-block;
    width:20px;height:20px;
    border:2px solid var(--matte-border-subtle);
    border-top-color:var(--matte-text-primary);
    border-radius:50%;
    animation:spin .6s linear infinite;
    margin-bottom:1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head><body>
<div class="card" id="content">
    <div class="loading-spinner"></div>
    <p>Loading...</p>
</div>
<div class="overlay" id="overlay" style="display:none">
    <div class="popup" id="popup"></div>
</div>
<script src="/assets/js/particles.js" defer></script>
<script>
(function(){
var c=document.getElementById('content');
var overlay=document.getElementById('overlay');
var popup=document.getElementById('popup');
var p=new URLSearchParams(window.location.search);

var icons={
    crown:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z"/><path d="M5 21h14"/></svg>',
    discord:'<svg width="18" height="14" viewBox="0 0 71 55" fill="none"><path d="M60.1 4.9C55.6 2.8 50.7 1.3 45.7.4c-.1 0-.2 0-.2.1-.6 1.1-1.3 2.6-1.8 3.7-5.5-.8-10.9-.8-16.3 0-.5-1.2-1.2-2.6-1.8-3.7-.1-.1-.2-.1-.3-.1C20.3 1.3 15.4 2.8 10.9 4.9c0 0-.1 0-.1.1C1.6 18.7-.9 32.1.3 45.4c0 .1 0 .1.1.2 6.1 4.5 12 7.2 17.7 9 .1 0 .2 0 .2-.1 1.4-1.9 2.6-3.8 3.6-5.9.1-.1 0-.3-.1-.3-2-.7-3.8-1.6-5.6-2.6-.1-.1-.1-.3 0-.4.4-.3.8-.6 1.1-.9.1-.1.1-.1.2-.1 11.6 5.3 24.2 5.3 35.7 0h.2c.4.3.7.6 1.1.9.1.1.1.3 0 .4-1.8 1-3.6 1.9-5.6 2.6-.1.1-.2.2-.1.3 1.1 2.1 2.3 4 3.6 5.9.1.1.2.1.3.1 5.8-1.8 11.7-4.5 17.8-9 .1 0 .1-.1.1-.2 1.5-15.3-2.5-28.6-10.5-40.4 0 0 0-.1-.1-.1zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.2 6.4-7.2c3.6 0 6.4 3.2 6.4 7.2-.1 3.9-2.9 7.1-6.4 7.1zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.2 6.4-7.2c3.6 0 6.4 3.2 6.4 7.2 0 3.9-2.8 7.1-6.4 7.1z" fill="white"/></svg>',
    warn:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>',
    pencil:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>',
    check:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    x:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
    shieldAlert:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>',
    arrowLeft:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>',
    logout:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
};

var currentView=null; // 'landing','dashboard','purchase'
var pollTimer=null;

function escapeHtml(s){
    var d=document.createElement('div');
    d.textContent=s;
    return d.innerHTML;
}

// Silent status recheck — if sub is no longer active, kick to purchase
function recheckStatus(){
    fetch('/vnpro/api/status',{credentials:'same-origin'}).then(function(r){
        if(r.status===401){
            stopPolling();
            showLanding(null);
            return;
        }
        if(!r.ok) return;
        return r.json();
    }).then(function(data){
        if(!data) return;
        if(currentView==='dashboard' && !(data.subscription && data.subscription.active)){
            // Subscription no longer active — kick to purchase
            stopPolling();
            showPurchase(data);
        } else if(currentView==='dashboard' && data.subscription && data.subscription.active){
            // Still active — silently update dashboard in case cancelAtPeriodEnd changed
            showDashboard(data);
        }
    }).catch(function(){});
}

function startPolling(){
    stopPolling();
    pollTimer=setInterval(recheckStatus,20000);
}

function stopPolling(){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

function showLanding(errorMsg){
    currentView='landing';
    stopPolling();
    var html='<div class="pro-badge">'+icons.crown+'PRO</div><h1>Void Network PRO</h1>';
    if(errorMsg){
        if(p.get('error')==='notinserver'){
            html+='<div class="err">You need to be in the Void Network Discord server before buying PRO! <a href="https://discord.gg/JUjV8JrXqp" target="_blank" rel="noopener" style="color:rgba(139,142,255,0.9);text-decoration:underline">Join here</a></div>';
        } else {
            html+='<div class="err">'+escapeHtml(errorMsg)+'</div>';
        }
    }
    html+='<p>Sign in with Discord to access your PRO dashboard or purchase a subscription.</p>';
    html+='<p class="sub">Your Discord username will be verified against your Stripe subscription.</p>';
    html+='<a href="/vnpro/discord-auth" class="btn discord-btn">'+icons.discord+'Sign in with Discord</a>';
    html+='<div class="discord-label">'+icons.discord+' Verified via Discord</div>';
    html+='<button class="btn manual-btn" onclick="showWarning1()">'+icons.pencil+'Purchase without Discord (manual)</button>';
    c.innerHTML=html;
}

function showDashboard(data){
    var sub=data.subscription;
    var renewDate=sub.currentPeriodEnd?new Date(sub.currentPeriodEnd*1000).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'N/A';
    var statusText=sub.cancelAtPeriodEnd?'Cancelling':'Active';
    var statusClass=sub.cancelAtPeriodEnd?'cancelling':'active';

    var html='<div class="pro-badge">'+icons.crown+'PRO</div>';
    html+='<h1>PRO Dashboard</h1>';

    if(p.has('success')) html+='<div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.15);color:rgba(34,197,94,0.9);padding:.8rem;border-radius:var(--matte-radius-sm);font-size:.8rem;margin-bottom:1rem;font-weight:400">Payment successful! Your PRO access is now active.</div>';

    html+='<p>Welcome, <strong style="color:var(--matte-text-primary)">'+escapeHtml(data.discordUsername)+'</strong></p>';
    html+='<div class="dash-info">';
    html+='<div class="dash-row"><span class="dash-label">Status</span><span class="dash-value '+statusClass+'">'+statusText+'</span></div>';
    html+='<div class="dash-row"><span class="dash-label">'+(sub.cancelAtPeriodEnd?'Access until':'Renews on')+'</span><span class="dash-value">'+renewDate+'</span></div>';
    html+='</div>';

    if(sub.cancelAtPeriodEnd){
        html+='<p class="sub" style="color:rgba(255,180,40,0.8)">Your subscription will end on '+renewDate+'. You will retain access until then.</p>';
    } else {
        html+='<button class="btn cancel-btn" onclick="showCancelConfirm()">'+icons.x+'Cancel Subscription</button>';
    }

    html+='<a href="/vnpro/logout" class="btn logout-btn">'+icons.logout+'Sign Out</a>';
    c.innerHTML=html;
    currentView='dashboard';
    startPolling();
}

function showPurchase(data){
    currentView='purchase';
    stopPolling();
    var html='<div class="pro-badge">'+icons.crown+'PRO</div><h1>Get Void Network PRO</h1>';
    if(p.has('cancelled')) html+='<div class="err">Payment was cancelled. You can try again below.</div>';
    html+='<p>Signed in as <strong style="color:var(--matte-text-primary)">'+escapeHtml(data.discordUsername)+'</strong></p>';
    html+='<p class="sub">Your Discord username will be linked to your purchase automatically.</p>';
    html+='<button class="btn purchase-btn" onclick="startCheckout()" id="checkout-btn">'+icons.crown+'Purchase PRO Subscription</button>';
    html+='<a href="/vnpro/logout" class="btn logout-btn">'+icons.logout+'Sign Out</a>';
    c.innerHTML=html;
}

function showError(msg){
    c.innerHTML='<div class="pro-badge">'+icons.crown+'PRO</div><h1>Error</h1><div class="err">'+escapeHtml(msg)+'</div><a href="/vnpro" class="btn secondary">'+icons.arrowLeft+'Try Again</a>';
}

function init(){
    fetch('/vnpro/api/status',{credentials:'same-origin'}).then(function(r){
        if(r.status===401){
            var errMap={discord:'Discord verification failed. Please try again.',config:'Service not configured.',stripe:'Could not create checkout session.',notinserver:'You need to be in the Void Network Discord server before buying PRO! Join here: https://discord.gg/JUjV8JrXqp'};
            showLanding(p.has('error')?errMap[p.get('error')]||'An error occurred.':null);
            return;
        }
        if(!r.ok) throw new Error('Server error');
        return r.json();
    }).then(function(data){
        if(!data) return;
        if(data.subscription && data.subscription.active){
            showDashboard(data);
        } else {
            showPurchase(data);
        }
    }).catch(function(){
        showLanding('Could not connect to server. Please try again.');
    });
}

window.startCheckout=function(){
    var btn=document.getElementById('checkout-btn');
    if(btn){btn.disabled=true;btn.innerHTML='<div class="loading-spinner" style="width:16px;height:16px;margin:0"></div>Redirecting...';}
    fetch('/vnpro/api/checkout',{method:'POST',credentials:'same-origin'}).then(function(r){
        if(r.status===401){window.location.href='/vnpro?error=discord';return;}
        if(!r.ok) throw new Error('Checkout failed');
        return r.json();
    }).then(function(data){
        if(data && data.url) window.location.href=data.url;
        else throw new Error('No URL');
    }).catch(function(){
        if(btn){btn.disabled=false;btn.innerHTML=icons.crown+'Purchase PRO Subscription';}
        var existing=document.querySelector('.err');
        if(!existing){
            var d=document.createElement('div');
            d.className='err';
            d.textContent='Could not create checkout session. Please try again.';
            var badge=c.querySelector('.pro-badge');
            if(badge&&badge.nextSibling) c.insertBefore(d,badge.nextSibling.nextSibling);
            else c.prepend(d);
        }
    });
};

window.showCancelConfirm=function(){
    // Recheck status before showing cancel dialog
    recheckStatus();
    overlay.style.display='flex';
    popup.innerHTML='<div class="warn-icon">'+icons.warn+'</div>'
    +'<h2>Are you sure?</h2>'
    +'<p>Doing this will <strong style="color:rgba(255,100,100,0.9)">instantly remove</strong> all of your roles and PRO features on the website. Are you sure you want to proceed?</p>'
    +'<div class="btn-row">'
    +'<button class="btn green-btn" onclick="closePopup()">'+icons.check+'Keep PRO</button>'
    +'<button class="btn red-btn" onclick="showCancelWarning2()">'+icons.x+'Yes, Cancel</button>'

    +'<button class="btn green-btn" onclick="closePopup()">'+icons.check+'Keep PRO</button>'
    +'<button class="btn red-btn" id="confirm-cancel-btn" onclick="confirmCancel()">'+icons.x+'Cancel Anyway</button>'
    +'</div>';
};

window.confirmCancel=function(){
    var btn=document.getElementById('confirm-cancel-btn');
    if(btn){btn.disabled=true;btn.innerHTML='<div class="loading-spinner" style="width:16px;height:16px;margin:0"></div>';}
    fetch('/vnpro/api/cancel',{method:'POST',credentials:'same-origin'}).then(function(r){
        if(r.status===401){window.location.href='/vnpro';return;}
        if(!r.ok) throw new Error('Cancel failed');
        return r.json();
    }).then(function(data){
        if(data && data.success){
            closePopup();
            init();
        } else throw new Error('Failed');
    }).catch(function(){
        closePopup();
        showError('Could not cancel subscription. Please try again.');
    });
};

window.closePopup=function(){
    overlay.style.display='none';
};

overlay.addEventListener('click',function(e){

});

// Pause polling when tab hidden, resume + immediate recheck when visible
document.addEventListener('visibilitychange',function(){
    if(document.hidden){
        stopPolling();
    } else if(currentView==='dashboard'){
        recheckStatus();
        startPolling();
    }
});

init();
})();
