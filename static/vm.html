<body>
<div class="container">
  <div class="header">
    <h1>Android Virtual Machine</h1>
    <button class="back-btn" onclick="window.location.href='/index.html'">← Back</button>
  </div>

  <div class="vm-area">
    <div class="start-screen" id="startScreen">
      <h2>Android Emulator</h2>
      <p>Start a temporary Android session (20 min limit)</p>
      <button class="start-btn" id="startBtn" onclick="startVM()">Start Android</button>
      <div class="status" id="status" style="display:none;"></div>
    </div>

    <div class="timer" id="timer"></div>
    <button class="stop-btn" id="stopBtn" onclick="stopVM()">Stop VM</button>
    <iframe class="vm-frame" id="vmFrame" allow="clipboard-read; clipboard-write"></iframe>
  </div>
</div>

<script>
let currentVmId = null;
let timerInterval = null;

async function startVM() {
  const btn = document.getElementById('startBtn');
  const status = document.getElementById('status');

  btn.disabled = true;
  btn.textContent = 'Starting...';
  status.style.display = 'block';
  status.className = 'status loading';
  status.textContent = 'Booting Android (this takes 1-2 minutes)...';

  try {
    const res = await fetch('/api/vm/start', { method: 'POST' });
    const data = await res.json();

    if (data.success) {
      currentVmId = data.vmId;
      showVM(data.vncPort, data.timeRemaining);
    } else {
      status.className = 'status error';
      status.textContent = data.error || 'Failed to start VM';
      btn.disabled = false;
      btn.textContent = 'Start Android';
    }
  } catch (err) {
    status.className = 'status error';
    status.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Start Android';
  }
}

function showVM(port, timeRemaining) {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('vmFrame').classList.add('active');
  document.getElementById('vmFrame').src = '/vm-proxy/' + port + '/';
  document.getElementById('timer').classList.add('active');
  document.getElementById('stopBtn').classList.add('active');

  startTimer(timeRemaining);
}

function startTimer(ms) {
  const timerEl = document.getElementById('timer');

  function update() {
    const mins = Math.floor(ms / 60000);
    const secs = Math.floor((ms % 60000) / 1000);
    timerEl.textContent = `Time: ${mins}:${secs.toString().padStart(2, '0')}`;

    if (ms <= 0) {
      clearInterval(timerInterval);
      alert('Session expired');
      location.reload();
    }
    ms -= 1000;
  }

  update();
  timerInterval = setInterval(update, 1000);
}

async function stopVM() {
  if (!currentVmId) return;

  if (!confirm('Stop this VM session?')) return;

  try {
    await fetch('/api/vm/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vmId: currentVmId })
    });
  } catch (e) {}

  clearInterval(timerInterval);
  location.reload();
}
</script>
