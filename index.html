<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="origin">
<meta name="google" content="notranslate">
<title>Google Classroom</title>
<meta name="description" content="Classroom is a free service for schools, nonprofits, and anyone with a personal Google account.">
<meta name="application-name" content="Google Classroom">
<meta name="theme-color" content="#1f1f1f">
<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<link rel="stylesheet" href="./assets/launcher.css">
</head>
<body>
<div id="top">
  <div class="logo"><img src="https://ssl.gstatic.com/classroom/favicon.png" alt=""><span>Classroom</span></div>
  <input id="search" type="text" placeholder="Search games&hellip;" autocomplete="off" spellcheck="false">
  <button id="back" type="button">&larr; Home</button>
</div>
<div id="home"><div id="grid"></div></div>
<iframe id="frame" title="Classroom"
  allow="fullscreen; clipboard-read; clipboard-write; autoplay; encrypted-media; gamepad; accelerometer; gyroscope; microphone; camera; midi; picture-in-picture"
  allowfullscreen referrerpolicy="no-referrer"></iframe>
<div id="splash"></div>
<script src="./assets/launcher.js"></script>
</body>
</html>
